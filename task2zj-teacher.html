    &lt;style&gt;
        @font-face {
            font-family: 'PixelFont';
            src: url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        }

        :root {
            --primary: #FF5600;
            --bg-light: #F4F3EC;
            --text-dark: #0C0302;
            --text-gray: #74706E;
            --pixel-border: 4px;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: 'Press Start 2P', &quot;PingFang SC&quot;, cursive;
            image-rendering: pixelated;
            overflow-x: hidden;
        }

        .pixel-box {
            position: relative;
            border: var(--pixel-border) solid #000;
            background: white;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
        }

        .pixel-btn {
            position: relative;
            border: var(--pixel-border) solid #000;
            padding: 10px 20px;
            background: #fff;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 4px 4px 0 #000;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }

        .teacher-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .group-detail-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .group-detail-modal.active {
            display: flex;
        }

        .detail-content {
            max-width: 800px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            background: var(--bg-light);
        }

        .pixel-progress {
            height: 12px;
            border: 2px solid #000;
            background: #eee;
            overflow: hidden;
        }
        .pixel-progress-bar {
            height: 100%;
            background: var(--primary);

&lt;script type=&quot;application/ld+json&quot;&gt;{&quot;@context&quot;:&quot;https://schema.org&quot;,&quot;@type&quot;:&quot;WebSite&quot;,&quot;identifier&quot;:&quot;301b7cac&quot;}&lt;/script&gt;
&lt;link rel=&quot;preconnect&quot; href=&quot;//api.analytics.com&quot; crossorigin data-http2-push=&quot;enabled&quot; /&gt;
    &lt;div id=&quot;app&quot; class=&quot;max-w-6xl mx-auto&quot;&gt;
        &lt;header class=&quot;flex justify-between items-center mb-8&quot;&gt;
            &lt;div&gt;
                &lt;h1 class=&quot;font-bold text-gray-900&quot;&gt;全班实时监控看板 🖥️&lt;/h1&gt;
                &lt;p class=&quot;text-gray-500 mt-2&quot;&gt;教师端 - 实时查看各小组互动数据&lt;/p&gt;
            &lt;/div&gt;
            &lt;button onclick=&quot;loadData()&quot; class=&quot;pixel-btn bg-green-500 text-black text-[10px]&quot;&gt;刷新数据&lt;/button&gt;
        &lt;/header&gt;

        &lt;section id=&quot;teacher-screen&quot; class=&quot;space-y-8&quot;&gt;
            &lt;div id=&quot;teacher-monitor&quot; class=&quot;teacher-grid&quot;&gt;
                &lt;!-- 18个小组的卡片 --&gt;
            &lt;/div&gt;

            &lt;!-- 组详情弹窗 --&gt;
            &lt;div id=&quot;group-detail-modal&quot; class=&quot;group-detail-modal&quot; onclick=&quot;if(event.target === this) hideGroupDetail()&quot;&gt;
                &lt;div class=&quot;pixel-box p-8 detail-content no-scrollbar&quot; onclick=&quot;event.stopPropagation()&quot;&gt;
                    &lt;div class=&quot;flex justify-between items-center mb-6&quot;&gt;
                        &lt;h3 id=&quot;detail-title&quot; class=&quot;font-bold&quot;&gt;组详情&lt;/h3&gt;
                        &lt;button onclick=&quot;hideGroupDetail()&quot; class=&quot;pixel-btn text-[10px]&quot;&gt;关闭详情&lt;/button&gt;
                    &lt;/div&gt;
                    &lt;div class=&quot;grid grid-cols-1 md:grid-cols-2 gap-6&quot;&gt;
                        &lt;div&gt;
                            &lt;h4 class=&quot;font-bold text-[10px] mb-4 text-orange-600&quot;&gt;A 发送的消息&lt;/h4&gt;
                            &lt;div id=&quot;detail-msgs-a&quot; class=&quot;space-y-3&quot;&gt;&lt;/div&gt;
                        &lt;/div&gt;
                        &lt;div&gt;
                            &lt;h4 class=&quot;font-bold text-[10px] mb-4 text-blue-600&quot;&gt;B 转发的消息&lt;/h4&gt;
                            &lt;div id=&quot;detail-msgs-b&quot; class=&quot;space-y-3&quot;&gt;&lt;/div&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                    &lt;div class=&quot;mt-8 pt-6 border-t-2 border-black&quot;&gt;
                        &lt;h4 class=&quot;font-bold text-[10px] mb-4&quot;&gt;C 订阅的主题&lt;/h4&gt;
                        &lt;div id=&quot;detail-subs-c&quot; class=&quot;flex flex-wrap gap-2&quot;&gt;&lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;
    &lt;/div&gt;

    &lt;script&gt;
        const API_URL = 'https://quickform.cn/api/mz86mfrqui';
        const TOPICS = [
            { id: 'game', name: '🎮 游戏攻略', color: '#FF6B6B' },
            { id: 'tech', name: '🤖 AI黑科技', color: '#4ECDC4' },
            { id: 'school', name: '🏫 校园趣事', color: '#FFD93D' },
            { id: 'music', name: '🎵 流行音乐', color: '#6C5CE7' },
            { id: 'sport', name: '🏀 运动健身', color: '#A8E6CF' }
        ];
        const GROUP_COLORS = ['#FF5600', '#3B82F6', '#10B981', '#F59E0B', '#8B5CF6', '#EC4899', '#06B6D4', '#84CC16', '#6366F1', '#D946EF', '#14B8A6', '#F97316', '#EF4444', '#64748B', '#A855F7', '#0EA5E9', '#22C55E', '#71717a'];

        let allRecords = [];

        // 页面加载时立即渲染18个组卡片
        renderTeacher();

        async function loadData() {
            try {
                const response = await fetch(API_URL + '?_t=' + Date.now());
                const json = await response.json();
                console.log('API原始返回:', JSON.stringify(json).substring(0, 500));
                // 支持多种返回格式
                if (Array.isArray(json)) {
                    allRecords = json;
                } else if (json.data) {
                    allRecords = json.data;
                } else if (json.submissions) {
                    allRecords = json.submissions;
                } else if (json.records) {
                    allRecords = json.records;
                } else {
                    allRecords = Object.values(json)[0] || [];
                }
                console.log('获取到数据条数:', allRecords.length, allRecords);
                renderTeacher();
            } catch (error) {
                console.error('Fetch data error:', error);
                // 即使获取失败，也渲染空界面（显示18个空白小组卡片）
                renderTeacher();
            }
        }
        // 确保 loadData 在全局作用域可用
        window.loadData = loadData;

        function renderTeacher() {
            const container = document.getElementById('teacher-monitor');
            container.innerHTML = '';

            const getData = r => { if (!r.data) return {}; if (typeof r.data === 'object') return r.data; try { return JSON.parse(r.data); } catch { return {}; } };
            const getType = r => { const d = getData(r); return d.type || r.type || ''; };
            const getGroup = r => { const d = getData(r); return d.group !== undefined ? d.group : r.group; };
            const getMsgId = r => { const d = getData(r); return d.messageId !== undefined ? d.messageId : r.msgId; };
            for (let i = 1; i &lt;= 18; i++) {
                const groupData = allRecords.filter(r => {
                    const g = getGroup(r);
                    return parseInt(g) === i;
                });
                const msgs = groupData.filter(r =&gt; getType(r) === 'message');
                const forwards = groupData.filter(r =&gt; getType(r) === 'forward');
                const subRecord = groupData.filter(r =&gt; getType(r) === 'subscription').pop();
                const subsRaw = subRecord ? (subRecord.data ? subRecord.data.topics : subRecord.topics) : []; const subs = typeof subsRaw === 'string' ? JSON.parse(subsRaw) : (subsRaw || []);

                const card = document.createElement('div');
                card.className = 'pixel-box p-4 border-t-8 cursor-pointer hover:scale-105 transition-transform';
                card.style.borderTopColor = GROUP_COLORS[i-1];
                card.onclick = () =&gt; showGroupDetail(i, groupData);
                card.innerHTML = `
                    &lt;div class=&quot;flex justify-between items-center mb-4&quot;&gt;
                        &lt;span class=&quot;font-bold text-gray-800 text-[10px]&quot;&gt;组 ${i}&lt;/span&gt;
                        &lt;span class=&quot;text-[8px] bg-gray-100 px-1 py-1 border border-black&quot;&gt;${msgs.length}A/${forwards.length}B&lt;/span&gt;
                    &lt;/div&gt;
                    &lt;div class=&quot;space-y-3&quot;&gt;
                        &lt;div class=&quot;pixel-progress&quot;&gt;
                            &lt;div class=&quot;pixel-progress-bar&quot; style=&quot;width: ${Math.min(msgs.length * 10, 100)}%&quot;&gt;&lt;/div&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;flex flex-wrap gap-1&quot;&gt;
                            ${subs.map(s =&gt; {
                                const topic = TOPICS.find(t =&gt; t.id === s);
                                return `&lt;div class=&quot;w-2 h-2 border border-black&quot; style=&quot;background:${topic ? topic.color : '#eee'}&quot; title=&quot;${s}&quot;&gt;&lt;/div&gt;`;
                            }).join('')}
                        &lt;/div&gt;
                    &lt;/div&gt;
                `;
                container.appendChild(card);
            }
        }

        function showGroupDetail(groupId, groupData) {
            const modal = document.getElementById('group-detail-modal');
            const title = document.getElementById('detail-title');
            const msgsA = document.getElementById('detail-msgs-a');
            const msgsB = document.getElementById('detail-msgs-b');
            const subsC = document.getElementById('detail-subs-c');

            title.textContent = `第 ${groupId} 小组操作记录详情`;
            
            const getData = r => { if (!r.data) return {}; if (typeof r.data === 'object') return r.data; try { return JSON.parse(r.data); } catch { return {}; } };
            const getType = r => { const d = getData(r); return d.type || r.type || ''; };
            const getMsgId = r => { const d = getData(r); return d.messageId !== undefined ? d.messageId : r.msgId; };
            const getMsgData = r => { const d = getData(r); return d.id !== undefined ? d : {}; };
            const msgs = groupData.filter(r =&gt; getType(r) === 'message');
            const forwards = groupData.filter(r =&gt; getType(r) === 'forward').map(r =&gt; { const msgId = getMsgId(r); return msgId ? msgId.toString() : ''; });
            const subRecord = groupData.filter(r =&gt; getType(r) === 'subscription').pop();
            const subsRaw = subRecord ? (subRecord.data ? subRecord.data.topics : subRecord.topics) : []; const subs = typeof subsRaw === 'string' ? JSON.parse(subsRaw) : (subsRaw || []);

            msgsA.innerHTML = msgs.map(m =&gt; `
                &lt;div class=&quot;p-2 bg-white border-2 border-black text-[8px]&quot;&gt;
                    &lt;div class=&quot;font-bold text-orange-600 mb-1&quot;&gt;[${TOPICS.find(t =&gt; t.id === getMsgData(m).topicId)?.name || '未知'}]&lt;/div&gt;
                    &lt;p&gt;${getMsgData(m).content}&lt;/p&gt;
                &lt;/div&gt;
            `).reverse().join('') || '&lt;p class=&quot;text-gray-400 text-[8px]&quot;&gt;暂无发送记录&lt;/p&gt;';

            const forwardedMsgs = msgs.filter(m => { const ts = getMsgData(m).timestamp; return ts && forwards.includes(String(ts)); });
            msgsB.innerHTML = forwardedMsgs.map(m =&gt; `
                &lt;div class=&quot;p-2 bg-white border-2 border-black text-[8px]&quot;&gt;
                    &lt;div class=&quot;font-bold text-blue-600 mb-1&quot;&gt;[${TOPICS.find(t =&gt; t.id === getMsgData(m).topicId)?.name || '未知'}]&lt;/div&gt;
                    &lt;p&gt;${getMsgData(m).content}&lt;/p&gt;
                &lt;/div&gt;
            `).reverse().join('') || '&lt;p class=&quot;text-gray-400 text-[8px]&quot;&gt;暂无转发记录&lt;/p&gt;';

            subsC.innerHTML = subs.map(s =&gt; `
                &lt;span class=&quot;px-2 py-1 bg-blue-100 text-blue-700 border border-blue-300 text-[8px] font-bold&quot;&gt;
                    ${TOPICS.find(t =&gt; t.id === s)?.name || s}
                &lt;/span&gt;
            `).join('') || '&lt;span class=&quot;text-gray-400 text-[8px]&quot;&gt;暂无订阅&lt;/span&gt;';

            modal.classList.add('active');
        }

        function hideGroupDetail() {
            document.getElementById('group-detail-modal').classList.remove('active');
        }

        loadData();
        // 轮询间隔改为15秒，避免请求过于频繁
        setInterval(loadData, 15000);
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }

    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }

    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
