            &lt;div&gt;
                &lt;h1 class=&quot;text-2xl font-black text-red-600&quot;&gt;❌ 数据传输效果测试 (全班视图)&lt;/h1&gt;
                &lt;p class=&quot;text-slate-500&quot;&gt;特点：线路杂乱交叉、设备直接互联、管理极其困难&lt;/p&gt;
            &lt;/div&gt;
            &lt;div class=&quot;flex gap-4&quot;&gt;
                &lt;div class=&quot;text-right&quot;&gt;
                    &lt;div class=&quot;text-sm font-bold text-slate-400 uppercase&quot;&gt;当前连接总数&lt;/div&gt;
                    &lt;div class=&quot;text-3xl font-black text-slate-800&quot; id=&quot;total-links&quot;&gt;0&lt;/div&gt;
                &lt;/div&gt;
                &lt;button onclick=&quot;clearHistory()&quot; class=&quot;bg-red-100 text-red-600 px-4 py-2 rounded-xl font-bold hover:bg-red-200 transition-all flex items-center gap-2&quot;&gt;
                    清空数据
                &lt;/button&gt;
                &lt;button onclick=&quot;location.reload()&quot; class=&quot;bg-slate-200 p-3 rounded-xl hover:bg-slate-300 transition-all&quot;&gt;退出&lt;/button&gt;

                &lt;g id=&quot;links-group&quot;&gt;&lt;/g&gt;
                &lt;g id=&quot;nodes-group&quot;&gt;&lt;/g&gt;
            &lt;/svg&gt;
            &lt;div id=&quot;chaos-alert&quot; class=&quot;absolute top-10 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full font-bold shadow-2xl opacity-0 transition-all pointer-events-none&quot;&gt;

    &lt;script&gt;
        const ROLES = [
            { id: 'temp', name: '温度传感器', icon: '🌡️' },
            { id: 'humi', name: '湿度传感器', icon: '💧' },
            { id: 'wind_speed', name: '风速传感器', icon: '🍃' },
            { id: 'wind_dir', name: '风向传感器', icon: '🧭' },
            { id: 'rain', name: '雨量传感器', icon: '🌧️' },
            { id: 'pressure', name: '气压传感器', icon: '⏲️' },
            { id: 'light', name: '光照传感器', icon: '☀️' },
            { id: 'uv', name: '紫外线传感器', icon: '🕶️' },
            { id: 'pm25', name: 'PM2.5传感器', icon: '🌫️' },
            { id: 'co2', name: 'CO2传感器', icon: '🧪' },
            { id: 'soil_humi', name: '土壤水分传感器', icon: '🌱' },
            { id: 'soil_temp', name: '土壤温度传感器', icon: '🌡️' },
            { id: 'noise', name: '噪声传感器', icon: '📢' },
            { id: 'visibility', name: '能见度传感器', icon: '👁️' }
        ];

        const TARGETS = [
            { id: 'phone_zhang', name: '张老师的手机', icon: '📱' },
            { id: 'pad_li', name: '李老师的平板', icon: '平板' },
            { id: 'watch_san', name: '张三的智能手环', icon: '⌚' },
            { id: 'big_screen', name: '学校大屏幕', icon: '🖥️' },
            { id: 'whiteboard', name: '8年级1班希沃白板', icon: '🏫' },
            { id: 'pc_lab', name: '微机室主控机', icon: '💻' },
            { id: 'speaker_hall', name: '礼堂智能音箱', icon: '🔊' },
            { id: 'kiosk', name: '校园信息查询机', icon: 'ℹ️' }
        ];

        let nodes = [];
        let history = [];
        let isCleared = false;

        function login() {
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;
            if (user === 'teacher' &amp;&amp; pass === '123456') {
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('teacher-app').classList.remove('hidden');
                initTeacherView();
            } else {
                alert('凭据错误');
            }
        }

        function initTeacherView() {
            const container = document.getElementById('chaos-canvas-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            const marginY = 60;
            const availableHeight = height - marginY * 2;
            
            ROLES.forEach((r, i) =&gt; {
                nodes.push({ ...r, x: 60, y: marginY + (availableHeight / (ROLES.length - 1)) * i });
            });
            TARGETS.forEach((r, i) =&gt; {
                nodes.push({ ...r, x: width - 60, y: marginY + (availableHeight / (TARGETS.length - 1)) * i });
            });

            const nodesGroup = document.getElementById('nodes-group');
            nodes.forEach(n =&gt; {
                const isSensor = ROLES.some(sr =&gt; sr.id === n.id);
                const g = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;g&quot;);
                g.setAttribute(&quot;transform&quot;, `translate(${n.x}, ${n.y})`);
                
                const circle = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;circle&quot;);
                circle.setAttribute(&quot;r&quot;, &quot;18&quot;); circle.setAttribute(&quot;fill&quot;, &quot;white&quot;);
                circle.setAttribute(&quot;stroke&quot;, &quot;#e2e8f0&quot;); circle.setAttribute(&quot;stroke-width&quot;, &quot;1&quot;);

                const text = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;text&quot;);
                text.setAttribute(&quot;text-anchor&quot;, &quot;middle&quot;); text.setAttribute(&quot;dy&quot;, &quot;6&quot;); 
                text.setAttribute(&quot;font-size&quot;, &quot;16&quot;); text.textContent = n.icon;

                const label = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;text&quot;);
                label.setAttribute(&quot;x&quot;, isSensor ? &quot;25&quot; : &quot;-25&quot;);
                label.setAttribute(&quot;text-anchor&quot;, isSensor ? &quot;start&quot; : &quot;end&quot;);
                label.setAttribute(&quot;dy&quot;, &quot;5&quot;); label.setAttribute(&quot;font-size&quot;, &quot;11&quot;);
                label.setAttribute(&quot;font-weight&quot;, &quot;600&quot;); label.setAttribute(&quot;fill&quot;, &quot;#475569&quot;);
                label.textContent = n.name;

                g.appendChild(circle); g.appendChild(text); g.appendChild(label);
                nodesGroup.appendChild(g);
            });

            requestAnimationFrame(updateTeacherFrame);
            setInterval(syncData, 2000);
        }

        function updateTeacherFrame() {
            const linksGroup = document.getElementById('links-group');
            document.getElementById('total-links').innerText = history.length;
            const recentHistory = history.slice(-50);
            linksGroup.innerHTML = '';
            
            recentHistory.forEach(h =&gt; {
                const fromNode = nodes.find(n =&gt; n.id === h.from);
                const toNode = nodes.find(n =&gt; n.id === h.to);
                if (fromNode &amp;&amp; toNode) {
                    const path = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;path&quot;);
                    const cp1x = (fromNode.x + toNode.x) / 2 + (Math.random() - 0.5) * 200;
                    const cp1y = (fromNode.y + toNode.y) / 2 + (Math.random() - 0.5) * 200;
                    path.setAttribute(&quot;d&quot;, `M ${fromNode.x} ${fromNode.y} Q ${cp1x} ${cp1y} ${toNode.x} ${toNode.y}`);
                    path.setAttribute(&quot;class&quot;, &quot;chaos-line&quot;);
                    if (Date.now() - h.time &lt; 2000) {
                        path.classList.add('active');
                        showChaosAlert();
                    }
                    linksGroup.appendChild(path);
                }
            });
            requestAnimationFrame(updateTeacherFrame);
        }

        function showChaosAlert() {
            const alert = document.getElementById('chaos-alert');
            alert.style.opacity = &quot;1&quot;;
            document.getElementById('teacher-app').classList.add('chaos-shake');
            setTimeout(() =&gt; {
                alert.style.opacity = &quot;0&quot;;
                document.getElementById('teacher-app').classList.remove('chaos-shake');
            }, 1000);
        }

        function syncData() {
            fetch('https://quickform.cn/api/re4wejp7tk/all', { method: 'GET', cache: 'no-cache' })
            .then(function(res) { return res.json(); })
            .then(function(res) {
                console.log('API返回数据:', res);
                
                // 兼容多种返回格式
                let data = null;
                if (Array.isArray(res)) {
                    data = res;
                } else if (res && typeof res === 'object') {
                    data = res.submissions || res.data || res.results || res.records || [];
                }
                
                console.log('解析后数据:', data);
                
                if (data && Array.isArray(data) && data.length > 0) {
                    // 如果已清空，不自动恢复数据
                    if (isCleared) {
                        console.log('数据已清空，跳过恢复');
                        return;
                    }
                    
                    // 映射远程数据到本地 history 格式
                    const remoteHistory = data.filter(function(item) {
                        const fromVal = item.from || item.sender || item.role;
                        const toVal = item.to || item.receiver || item.target;
                        return fromVal && toVal;
                    }).map(function(item) {
                        const fromVal = item.from || item.sender || item.role;
                        const toVal = item.to || item.receiver || item.target;
                        const timeVal = item.timestamp || item.time || item.created_at || new Date().toISOString();
                        
                        return {
                            from: ROLES.find(function(r) { return r.name === fromVal; })?.id || 'temp',
                            to: TARGETS.find(function(t) { return t.name === toVal; })?.id || 'phone_zhang',
                            time: new Date(timeVal).getTime()
                        };
                    });

                    console.log('有效历史记录:', remoteHistory.length, '条');
                    document.getElementById('total-links').innerText = remoteHistory.length;
                    
                    // 直接更新历史记录
                    history = remoteHistory;
                }
            }).catch(function(err) { console.error('同步失败:', err); });
        }
        function clearHistory() {
            if (confirm('确定清空吗？')) { 
                history = []; 
                isCleared = true;
                document.getElementById('total-links').innerText = '0';
            }
        }
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
