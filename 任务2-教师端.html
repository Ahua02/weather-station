<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务2：悄悄话体验 - 教师端</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      line-height: 1.5;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
    .pixel-box { background: white; border: 2px solid #000; box-shadow: 4px 4px 0 #000; }
    .pixel-btn {
      padding: 8px 16px; border: 2px solid #000; box-shadow: 3px 3px 0 #000;
      cursor: pointer; font-weight: bold; background: #f97316; color: white;
    }
    .pixel-btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 #000; }
    .pixel-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 通用样式 */
    .p-4 { padding: 1rem; } .p-6 { padding: 1.5rem; } .p-8 { padding: 2rem; }
    .mb-4 { margin-bottom: 1rem; } .mb-6 { margin-bottom: 1.5rem; } .mb-8 { margin-bottom: 2rem; }
    .mt-4 { margin-top: 1rem; } .mt-6 { margin-top: 1.5rem; } .mt-8 { margin-top: 2rem; }
    .space-y-4 > * + * { margin-top: 1rem; } .space-y-3 > * + * { margin-top: 0.75rem; }
    .flex { display: flex; } .flex-1 { flex: 1; } .flex-wrap { flex-wrap: wrap; }
    .hidden { display: none !important; }
    .text-center { text-align: center; } .text-left { text-align: left; }
    .text-xs { font-size: 0.75rem; } .text-sm { font-size: 0.875rem; }
    .text-lg { font-size: 1.125rem; } .text-xl { font-size: 1.25rem; }
    .text-2xl { font-size: 1.5rem; } .text-3xl { font-size: 1.875rem; }
    .font-bold { font-weight: 700; } .font-medium { font-weight: 500; }
    .text-gray-500 { color: #6b7280; } .text-gray-600 { color: #4b5563; }
    .text-orange-600 { color: #ea580c; } .text-green-600 { color: #16a34a; }
    .text-blue-600 { color: #2563eb; } .text-white { color: white; }
    .bg-orange-50 { background: #fff7ed; } .bg-green-50 { background: #f0fdf4; }
    .bg-blue-50 { background: #eff6ff; } .bg-gray-100 { background: #f3f4f6; }
    .bg-orange-500 { background: #f97316; } .bg-green-500 { background: #22c55e; }
    .bg-blue-500 { background: #3b82f6; } .bg-white { background: white; }
    .border-2 { border-width: 2px; border-style: solid; }
    .border-black { border-color: #000; } .border-gray-200 { border-color: #e5e7eb; }
    .border-t-2 { border-top-width: 2px; border-top-style: solid; }
    .border-orange-300 { border-color: #fdba74; } .border-blue-300 { border-color: #93c5fd; }
    .border-green-500 { border-color: #22c55e; }
    .w-full { width: 100%; } .max-w-md { max-width: 28rem; } .mx-auto { margin-left: auto; margin-right: auto; }
    .h-64 { height: 16rem; }
    .overflow-y-auto { overflow-y: auto; }
    .gap-4 { gap: 1rem; } .gap-6 { gap: 1.5rem; } .gap-2 { gap: 0.5rem; }
    .rounded-md { border-radius: 0.375rem; }
    .cursor-pointer { cursor: pointer; }
    .justify-between { justify-content: space-between; } .justify-center { justify-content: center; }
    .items-center { align-items: center; } .items-start { align-items: flex-start; }
    .hover\:scale-105:hover { transform: scale(1.05); }
    .transition-transform { transition: transform 0.2s; }

    /* 响应式 */
    @media (min-width: 768px) {
      .md\:grid-cols-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
      .md\:grid-cols-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
      .md\:grid-cols-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    }
    @media (max-width: 767px) {
      .md\:grid-cols-2, .md\:grid-cols-3, .md\:grid-cols-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
    }

    /* 协议警告 */
    .protocol-warning {
      background: #ef4444; color: white; padding: 1rem; text-align: center;
      font-weight: bold; position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
    }

    /* 教师看板 */
    .teacher-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
    }

    /* 组卡片 */
    .group-card {
      padding: 1rem; cursor: pointer; transition: transform 0.2s;
    }
    .group-card:hover { transform: scale(1.02); }

    /* 进度条 */
    .progress-bar {
      height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden;
    }
    .progress-fill { height: 100%; background: #f97316; transition: width 0.3s; }

    /* 弹窗 */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 1000; display: flex;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-content { background: white; border: 2px solid #000; box-shadow: 8px 8px 0 #000; max-height: 90vh; overflow-y: auto; width: 100%; max-width: 800px; }
  </style>
</head>
<body>
  <!-- 协议警告 -->
  <div id="protocol-warning" class="protocol-warning hidden">
    ⚠️ 检测到您正在通过文件方式打开页面！<br>
    无法获取 quickform 数据！<br>
    请双击运行「启动服务器.bat」，然后通过 http://localhost 地址访问此页面。
  </div>

  <div class="container">
    <!-- 标题栏 -->
    <header class="flex justify-between items-center mb-8 flex-wrap gap-4">
      <div>
        <h1 class="font-bold text-gray-900 text-2xl">📊 任务2：悄悄话体验 - 教师端</h1>
        <p class="text-gray-500 mt-2">实时监控全班18个小组的发布-订阅互动</p>
      </div>
      <div class="flex items-center gap-4">
        <span id="last-update" class="text-gray-400 text-sm"></span>
        <span id="record-count" class="text-gray-500 text-sm"></span>
        <button id="refresh-btn" onclick="loadData()" class="pixel-btn bg-green-500 text-white">🔄 刷新数据</button>
      </div>
    </header>

    <!-- 统计概览 -->
    <div class="grid md:grid-cols-4 gap-4 mb-8">
      <div class="pixel-box p-4 text-center">
        <div id="total-groups" class="text-3xl font-bold text-blue-600">0</div>
        <div class="text-sm text-gray-500">有数据的组</div>
      </div>
      <div class="pixel-box p-4 text-center">
        <div id="total-msgs" class="text-3xl font-bold text-orange-600">0</div>
        <div class="text-sm text-gray-500">A 发布消息</div>
      </div>
      <div class="pixel-box p-4 text-center">
        <div id="total-forwards" class="text-3xl font-bold text-green-600">0</div>
        <div class="text-sm text-gray-500">B 转发消息</div>
      </div>
      <div class="pixel-box p-4 text-center">
        <div id="total-subs" class="text-3xl font-bold text-purple-600">0</div>
        <div class="text-sm text-gray-500">C 订阅数</div>
      </div>
    </div>

    <!-- 18个组卡片 -->
    <div id="teacher-monitor" class="teacher-grid">
      <!-- 动态生成 -->
    </div>

    <!-- 组详情弹窗 -->
    <div id="group-detail-modal" class="modal-overlay hidden" onclick="if(event.target === this) hideGroupDetail()">
      <div class="modal-content p-6" onclick="event.stopPropagation()">
        <div class="flex justify-between items-center mb-6">
          <h3 id="detail-title" class="font-bold text-xl">组详情</h3>
          <button onclick="hideGroupDetail()" class="pixel-btn bg-gray-300 text-black">关闭</button>
        </div>
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <h4 class="font-bold text-orange-600 mb-4">✍️ A 发送的消息</h4>
            <div id="detail-msgs-a" class="space-y-3 max-h-64 overflow-y-auto"></div>
          </div>
          <div>
            <h4 class="font-bold text-green-600 mb-4">🖥️ B 转发的消息</h4>
            <div id="detail-msgs-b" class="space-y-3 max-h-64 overflow-y-auto"></div>
          </div>
        </div>
        <div class="mt-6 pt-4 border-t-2 border-gray-200">
          <h4 class="font-bold text-blue-600 mb-4">👂 C 订阅的主题</h4>
          <div id="detail-subs-c" class="flex flex-wrap gap-2"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 配置
    var API_URL = 'https://quickform.cn/api/mz86mfrqui/all';
    var TOPICS = [
      { id: 'game', name: '🎮 游戏攻略', color: '#FF6B6B' },
      { id: 'tech', name: '🤖 AI黑科技', color: '#4ECDC4' },
      { id: 'school', name: '🏫 校园趣事', color: '#FFD93D' },
      { id: 'music', name: '🎵 流行音乐', color: '#6C5CE7' },
      { id: 'sport', name: '🏀 运动健身', color: '#A8E6CF' }
    ];
    var GROUP_COLORS = ['#FF5600', '#3B82F6', '#10B981', '#F59E0B', '#8B5CF6', '#EC4899', '#06B6D4', '#84CC16', '#6366F1', '#D946EF', '#14B8A6', '#F97316', '#EF4444', '#64748B', '#A855F7', '#0EA5E9', '#22C55E', '#71717a'];

    var allRecords = [];
    var isLoading = false;

    // 检测协议
    function checkProtocol() {
      var warning = document.getElementById('protocol-warning');
      if (warning) {
        if (window.location.protocol === 'file:') {
          warning.classList.remove('hidden');
        } else {
          warning.classList.add('hidden');
        }
      }
    }

    // 更新最后更新时间
    function updateLastUpdate() {
      var el = document.getElementById('last-update');
      if (el) el.textContent = '上次更新: ' + new Date().toLocaleTimeString();
    }

    // 更新记录数
    function updateRecordCount() {
      var el = document.getElementById('record-count');
      if (el) el.textContent = '共 ' + allRecords.length + ' 条记录';
    }

    // 设置加载状态
    function setLoadingState(loading) {
      var btn = document.getElementById('refresh-btn');
      if (btn) {
        btn.disabled = loading;
        btn.textContent = loading ? '⏳ 加载中...' : '🔄 刷新数据';
      }
      isLoading = loading;
    }

    // 提取记录
    function extractRecords(obj) {
      if (Array.isArray(obj)) return obj;
      if (obj && typeof obj === 'object') {
        if (obj.data !== undefined) {
          if (Array.isArray(obj.data)) return obj.data;
          if (typeof obj.data === 'object') {
            return Object.keys(obj.data).map(function(k) { return obj.data[k]; }).reduce(function(a, b) { return a.concat(b instanceof Array ? b : [b]); }, []).filter(Boolean);
          }
        }
        if (obj.submissions !== undefined && Array.isArray(obj.submissions)) return obj.submissions;
        if (obj.records !== undefined && Array.isArray(obj.records)) return obj.records;
        var values = Object.keys(obj).map(function(k) { return obj[k]; });
        if (values.length > 0 && typeof values[0] === 'object') {
          var flat = values.reduce(function(a, b) { return a.concat(b instanceof Array ? b : [b]); }, []);
          return flat.filter(function(v) { return v && typeof v === 'object'; });
        }
      }
      return [];
    }

    // 获取记录数据
    function getRecordData(r) {
      if (r.data !== undefined) {
        if (typeof r.data === 'object') return r.data;
        try { return JSON.parse(r.data); } catch { return {}; }
      }
      return r;
    }

    // 获取类型
    function getRecordType(r) {
      var d = getRecordData(r);
      return d.type || r.type || '';
    }

    // 获取组号
    function getRecordGroup(r) {
      var d = getRecordData(r);
      return d.group !== undefined ? d.group : (r.group !== undefined ? r.group : '');
    }

    // 获取消息ID
    function getMsgId(r) {
      var d = getRecordData(r);
      return d.msgId || d.messageId || d.id || d.timestamp || r.msgId || r.messageId || r.id || r.timestamp || '';
    }

    // 加载数据
    async function loadData() {
      // file:// 协议下无法进行网络请求
      if (window.location.protocol === 'file:') {
        alert('⚠️ 检测到您正在通过文件方式打开页面！\n\n无法获取 quickform 数据！\n\n请双击运行「启动服务器.bat」，然后通过 http://localhost 地址访问此页面。');
        return;
      }

      if (isLoading) return;
      setLoadingState(true);

      try {
        var response = await fetch(API_URL + '?_t=' + Date.now());
        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }
        var json = await response.json();

        allRecords = extractRecords(json);
        console.log('获取到数据条数:', allRecords.length);
        console.log('原始数据示例:', JSON.stringify(json).substring(0, 500));

        renderTeacher();
        updateStats();
        updateLastUpdate();
        updateRecordCount();
      } catch (error) {
        console.error('获取数据失败:', error);
        alert('⚠️ 获取数据失败：' + error.message + '\n\n请确保已通过 http://localhost 访问此页面。');
        allRecords = [];
        renderTeacher();
        updateStats();
      } finally {
        setLoadingState(false);
      }
    }

    // 确保 loadData 全局可用
    window.loadData = loadData;

    // 更新统计
    function updateStats() {
      var groupsWithData = new Set();
      var msgCount = 0;
      var forwardCount = 0;
      var subCount = 0;

      allRecords.forEach(function(r) {
        var g = getRecordGroup(r);
        var t = getRecordType(r);
        if (g) groupsWithData.add(g);
        if (t === 'message') msgCount++;
        if (t === 'forward') forwardCount++;
        if (t === 'subscription') subCount++;
      });

      document.getElementById('total-groups').textContent = groupsWithData.size;
      document.getElementById('total-msgs').textContent = msgCount;
      document.getElementById('total-forwards').textContent = forwardCount;
      document.getElementById('total-subs').textContent = subCount;
    }

    // 渲染教师看板
    function renderTeacher() {
      var container = document.getElementById('teacher-monitor');
      container.innerHTML = '';

      for (var i = 1; i <= 18; i++) {
        var groupData = allRecords.filter(function(r) {
          var g = getRecordGroup(r);
          return parseInt(g) === i;
        });

        var msgs = groupData.filter(function(r) { return getRecordType(r) === 'message'; });
        var forwards = groupData.filter(function(r) { return getRecordType(r) === 'forward'; });
        var subRecord = groupData.filter(function(r) { return getRecordType(r) === 'subscription'; }).pop();
        var subsRaw = subRecord ? (getRecordData(subRecord).topics || []) : [];
        var subs = typeof subsRaw === 'string' ? JSON.parse(subsRaw) : (subsRaw || []);

        var card = document.createElement('div');
        card.className = 'pixel-box group-card';
        card.style.borderTopColor = GROUP_COLORS[i - 1];
        card.style.borderTopWidth = '4px';
        card.style.borderTopStyle = 'solid';
        card.onclick = (function(groupId, data) {
          return function() { showGroupDetail(groupId, data); };
        })(i, groupData);

        var progressPercent = Math.min(msgs.length * 10, 100);
        var topicDots = subs.map(function(s) {
          var topic = TOPICS.find(function(t) { return t.id === s; });
          return '<div class="w-3 h-3 border border-black" style="background:' + (topic ? topic.color : '#eee') + '" title="' + s + '"></div>';
        }).join('');

        card.innerHTML = '\
          <div class="flex justify-between items-center mb-3">\
            <span class="font-bold text-gray-800 text-sm">第 ' + i + ' 组</span>\
            <span class="text-xs bg-gray-100 px-2 py-1 border border-black">' + msgs.length + 'A/' + forwards.length + 'B</span>\
          </div>\
          <div class="progress-bar mb-3">\
            <div class="progress-fill" style="width: ' + progressPercent + '%"></div>\
          </div>\
          <div class="flex flex-wrap gap-1">\
            ' + (topicDots || '<span class="text-xs text-gray-400">暂无订阅</span>') + '\
          </div>\
        ';

        container.appendChild(card);
      }
    }

    // 显示组详情
    function showGroupDetail(groupId, groupData) {
      var modal = document.getElementById('group-detail-modal');
      document.getElementById('detail-title').textContent = '第 ' + groupId + ' 组详情';

      var msgs = groupData.filter(function(r) { return getRecordType(r) === 'message'; });
      var forwards = groupData.filter(function(r) { return getRecordType(r) === 'forward' || getRecordType(r) === 'message'; }).map(function(r) { return getMsgId(r); });
      var subRecord = groupData.filter(function(r) { return getRecordType(r) === 'subscription'; }).pop();
      var subsRaw = subRecord ? (getRecordData(subRecord).topics || []) : [];
      var subs = typeof subsRaw === 'string' ? JSON.parse(subsRaw) : (subsRaw || []);

      // A 的消息
      var msgsAHtml = '';
      if (msgs.length === 0) {
        msgsAHtml = '<p class="text-gray-400 text-center p-4">暂无消息</p>';
      } else {
        msgs.forEach(function(m) {
          var d = getRecordData(m);
          var topic = TOPICS.find(function(t) { return t.id === d.topicId; });
          msgsAHtml += '<div class="p-3 border-2 border-orange-300 bg-orange-50 text-sm">' +
            '<span class="font-bold" style="color:#fff;background:' + (topic ? topic.color : '#999') + ';padding:2px 8px;border-radius:4px">' + (topic ? topic.name : '') + '</span> ' +
            escapeHtml(d.content || '') +
            '</div>';
        });
      }
      document.getElementById('detail-msgs-a').innerHTML = msgsAHtml;

      // B 转发的消息
      var forwardedMsgs = msgs.filter(function(m) { return forwards.indexOf(getMsgId(m)) > -1; });
      var msgsBHtml = '';
      if (forwardedMsgs.length === 0) {
        msgsBHtml = '<p class="text-gray-400 text-center p-4">暂无转发</p>';
      } else {
        forwardedMsgs.forEach(function(m) {
          var d = getRecordData(m);
          var topic = TOPICS.find(function(t) { return t.id === d.topicId; });
          msgsBHtml += '<div class="p-3 border-2 border-green-500 bg-green-50 text-sm">' +
            '<span class="font-bold" style="color:#fff;background:' + (topic ? topic.color : '#999') + ';padding:2px 8px;border-radius:4px">' + (topic ? topic.name : '') + '</span> ' +
            escapeHtml(d.content || '') +
            '</div>';
        });
      }
      document.getElementById('detail-msgs-b').innerHTML = msgsBHtml;

      // C 的订阅
      var subsCHtml = '';
      if (subs.length === 0) {
        subsCHtml = '<p class="text-gray-400 text-sm">暂无订阅</p>';
      } else {
        subs.forEach(function(s) {
          var topic = TOPICS.find(function(t) { return t.id === s; });
          subsCHtml += '<span class="px-3 py-1 text-sm" style="background:' + (topic ? topic.color : '#999') + ';color:white;border-radius:9999px;font-weight:600">' + (topic ? topic.name : s) + '</span>';
        });
      }
      document.getElementById('detail-subs-c').innerHTML = subsCHtml;

      modal.classList.remove('hidden');
    }

    // 隐藏组详情
    function hideGroupDetail() {
      document.getElementById('group-detail-modal').classList.add('hidden');
    }

    // HTML转义
    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 页面加载时初始化
    checkProtocol();
    renderTeacher();
    loadData();
    // 每5秒自动刷新
    setInterval(loadData, 5000);
  </script>
</body>
</html>
