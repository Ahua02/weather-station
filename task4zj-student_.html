                { type: 'choice', q: '在校园气象站系统中，负责转发气象数据、管理订阅关系的&ldquo;中间人&rdquo;角色被称为？', options: ['Publisher (发布者)', 'Subscriber (订阅者)', 'Broker (代理服务器)', 'Client (客户端)'], a: 2, hint: 'Broker 是 MQTT 架构的核心枢纽。' },
                { type: 'choice', q: '气象站将温度数据发送到主题 &quot;campus/weather/temp&quot;，这个动作在 MQTT 中称为？', options: ['订阅 (Subscribe)', '发布 (Publish)', '连接 (Connect)', '断开 (Disconnect)'], a: 1, hint: '发送数据的行为即为发布。' },
                { type: 'choice', q: '如果手机 App 想要接收气象站的数据，它必须先向 Broker 发送什么请求？', options: ['发布 (Publish)', '订阅 (Subscribe)', '心跳 (Ping)', '确认 (Ack)'], a: 1, hint: '只有订阅了相关主题，才能收到推送。' },
                { type: 'choice', q: 'MQTT 协议主要运行在 TCP/IP 四层模型中的哪一层？', options: ['网络接口层', '网络层', '传输层', '应用层'], a: 3, hint: 'MQTT 是基于 TCP/IP 的应用层协议。' },
                { type: 'choice', q: '在 MQTT 中，发布者和订阅者之间是否需要知道对方的 IP 地址？', options: ['需要，必须直接通信', '不需要，双方通过代理服务器中转', '只有发布者需要知道', '只有订阅者需要知道'], a: 1, hint: 'MQTT 实现了发布者和订阅者的相互独立，无需直接通信。' }
            ],
            level2: [ // 判断题
                { type: 'boolean', q: 'MQTT 协议采用的是&ldquo;发布-订阅&rdquo;模式。', a: true, hint: '这是 MQTT 的核心通信模式。' },
                { type: 'boolean', q: '一个气象站发布的数据，可以同时被多个订阅了该主题的手机 App 接收。', a: true, hint: '这是一对多的通信特性。' },
                { type: 'boolean', q: 'MQTT 协议因为其报头极其精简，非常适合在带宽受限的校园物联网环境中使用。', a: true, hint: '轻量级是 MQTT 的核心优势。' },
                { type: 'boolean', q: '如果代理服务器 (Broker) 宕机了，发布者仍然可以直接把数据发给订阅者。', a: false, hint: '所有消息必须经过代理服务器转发。' },
                { type: 'boolean', q: '在 MQTT 中，订阅者可以随时接收发布者推送的消息，而不需要主动去询问。', a: true, hint: '这是&ldquo;推&rdquo;模式的特点。' }
            ],
            level3: [ // 拖拽流程图
                { 
                    type: 'drag-flow', 
                    q: '请完善发送端与接收端的算法流程图（拖动组件到对应空位）：',
                    items: [
                        { id: 'read', label: '读取传感器数据', icon: '🌡️' },
                        { id: 'upload', label: '上传传感器数据', icon: '📤' },
                        { id: 'sub', label: '订阅温度主题', icon: '🔔' },
                        { id: 'led', label: 'LED输出温度', icon: '💡' }
                    ],
                    flow: {
                        sender: [
                            { label: '开始', type: 'box' },
                            { label: '连接云平台', type: 'box' },
                            { id: 'slot1', label: '', type: 'slot', accept: 'read' },
                            { id: 'slot2', label: '', type: 'slot', accept: 'upload' },
                            { label: '等待时间', type: 'box' }
                        ],
                        receiver: [
                            { label: '开始', type: 'box' },
                            { label: '连接云平台', type: 'box' },
                            { id: 'slot3', label: '', type: 'slot', accept: 'sub' },
                            { label: '是否收到温度信息?', type: 'diamond' },
                            { id: 'slot4', label: '', type: 'slot', accept: 'led' }
                        ]
                    }
                }
            ]
        };

        let state = {
            phase: GamePhase.LOGIN,
            studentName: '',
            currentLevel: 1,
            questionIndex: 0,
            score: 0,
            correctCount: 0,
            totalQuestions: 11,
            answered: false,
            wrongQuestions: [] // 记录错题
        };

        function handleLogin() {
            const nameInput = document.getElementById('student-name-input');
            if (!nameInput.value.trim()) {
                alert('请输入姓名');
                return;
            }
            state.studentName = nameInput.value.trim();
            state.phase = GamePhase.INTRO;
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('intro-page').classList.remove('hidden');
            document.getElementById('welcome-text').innerText = `你好，${state.studentName}同学！`;
        }

        function startGame() {
            state.phase = GamePhase.PLAYING;
            document.getElementById('intro-page').classList.add('hidden');
            document.getElementById('status-bar').classList.remove('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            state.answered = false;
            const levelKey = `level${state.currentLevel}`;
            const qData = questionBank[levelKey][state.questionIndex];
            const container = document.getElementById('question-card');
            
            const progress = ((state.correctCount + state.questionIndex) / state.totalQuestions) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('level-display').innerText = `关卡 ${state.currentLevel}/3`;

            let html = `&lt;h3 class=&quot;text-sm font-bold text-blue-500 mb-2 uppercase tracking-wider&quot;&gt;第 ${state.questionIndex + 1} 题&lt;/h3&gt;`;
            html += `&lt;p class=&quot;text-xl text-gray-800 font-bold mb-8&quot;&gt;${qData.q}&lt;/p&gt;`;

            if (qData.type === 'choice') {
                html += `&lt;div class=&quot;grid gap-4&quot;&gt;`;
                qData.options.forEach((opt, i) =&gt; {
                    html += `&lt;button onclick=&quot;checkAnswer(${i})&quot; class=&quot;option-btn text-left p-4 rounded-xl border-2 border-gray-200 hover:border-blue-400 transition-all duration-200 flex items-center gap-4&quot;&gt;
                        &lt;span class=&quot;w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center font-bold text-gray-500&quot;&gt;${String.fromCharCode(65+i)}&lt;/span&gt;
                        &lt;span class=&quot;text-gray-700&quot;&gt;${opt}&lt;/span&gt;
                    &lt;/button&gt;`;
                });
                html += `&lt;/div&gt;`;
            } else if (qData.type === 'boolean') {
                html += `&lt;div class=&quot;flex gap-6 justify-center mt-8&quot;&gt;
                    &lt;button onclick=&quot;checkAnswer(true)&quot; class=&quot;option-btn w-32 h-32 rounded-2xl border-2 border-gray-200 hover:border-green-400 flex flex-col items-center justify-center gap-2 transition-all&quot;&gt;
                        &lt;span class=&quot;text-4xl&quot;&gt;✅&lt;/span&gt;&lt;span class=&quot;font-bold text-gray-600&quot;&gt;正确 (True)&lt;/span&gt;
                    &lt;/button&gt;
                    &lt;button onclick=&quot;checkAnswer(false)&quot; class=&quot;option-btn w-32 h-32 rounded-2xl border-2 border-gray-200 hover:border-red-400 flex flex-col items-center justify-center gap-2 transition-all&quot;&gt;
                        &lt;span class=&quot;text-4xl&quot;&gt;❌&lt;/span&gt;&lt;span class=&quot;font-bold text-gray-600&quot;&gt;错误 (False)&lt;/span&gt;
                    &lt;/button&gt;
                &lt;/div&gt;`;
            } else if (qData.type === 'drag-flow') {
                html += `&lt;div class=&quot;flex flex-col gap-6&quot;&gt;
                    &lt;div id=&quot;drag-items&quot; class=&quot;flex flex-wrap justify-center gap-3 p-4 bg-blue-50 rounded-xl&quot;&gt;
                        ${qData.items.map(item =&gt; `&lt;div id=&quot;${item.id}&quot; draggable=&quot;true&quot; ondragstart=&quot;onDragStart(event)&quot; class=&quot;draggable bg-white p-2 px-4 rounded-lg shadow-sm border border-blue-200 flex items-center gap-2 text-sm font-bold&quot;&gt;
                            &lt;span&gt;${item.icon}&lt;/span&gt;&lt;span&gt;${item.label}&lt;/span&gt;
                        &lt;/div&gt;`).join('')}
                    &lt;/div&gt;
                    &lt;div class=&quot;grid grid-cols-1 md:grid-cols-2 gap-16 relative mt-4&quot;&gt;
                        &lt;!-- 发送端 --&gt;
                        &lt;div class=&quot;flex flex-col items-center relative&quot;&gt;
                            &lt;div class=&quot;flex flex-col items-center relative pb-4&quot;&gt;
                                ${qData.flow.sender.map((step, i) =&gt; `
                                    &lt;div class=&quot;flex flex-col items-center relative&quot;&gt;
                                        &lt;div id=&quot;${step.id || ''}&quot; ${step.type === 'slot' ? 'ondragover=&quot;onDragOver(event)&quot; ondrop=&quot;onDrop(event)&quot;' : ''} 
                                             class=&quot;${step.type === 'slot' ? 'drop-zone w-40 h-12' : 'bg-gray-100 w-40 h-10'} rounded-lg flex items-center justify-center text-xs border border-gray-300 z-10&quot;&gt;
                                            ${step.label}
                                        &lt;/div&gt;
                                        ${i &lt; qData.flow.sender.length - 1 ? '&lt;span class=&quot;text-blue-300 leading-none py-1&quot;&gt;&darr;&lt;/span&gt;' : ''}
                                    &lt;/div&gt;
                                `).join('')}
                                &lt;!-- 发送端循环箭头：从等待时间回到读取数据 --&gt;
                                &lt;div class=&quot;absolute -left-8 top-[108px] bottom-[20px] w-8 border-l-2 border-t-2 border-b-2 border-blue-300 rounded-l-lg z-0&quot;&gt;
                                    &lt;span class=&quot;absolute -top-2.5 -right-1.5 text-blue-400 text-xs&quot;&gt;▲&lt;/span&gt;
                                &lt;/div&gt;
                            &lt;/div&gt;
                            &lt;span class=&quot;mt-4 text-sm font-bold text-blue-700 bg-blue-50 px-4 py-1 rounded-full&quot;&gt;发送端数据采集发布算法流程图&lt;/span&gt;
                        &lt;/div&gt;
                        &lt;!-- 接收端 --&gt;
                        &lt;div class=&quot;flex flex-col items-center relative&quot;&gt;
                            &lt;div class=&quot;flex flex-col items-center relative pb-4&quot;&gt;
                                ${qData.flow.receiver.map((step, i) =&gt; `
                                    &lt;div class=&quot;flex flex-col items-center relative&quot;&gt;
                                        &lt;div id=&quot;${step.id || ''}&quot; ${step.type === 'slot' ? 'ondragover=&quot;onDragOver(event)&quot; ondrop=&quot;onDrop(event)&quot;' : ''} 
                                             class=&quot;${step.type === 'slot' ? 'drop-zone w-40 h-12' : (step.type === 'diamond' ? 'bg-yellow-50 w-24 h-24 rotate-45 flex items-center justify-center border border-yellow-200 my-4' : 'bg-gray-100 w-40 h-10')} rounded-lg flex items-center justify-center text-xs border border-gray-300 z-10&quot;&gt;
                                            &lt;span class=&quot;${step.type === 'diamond' ? '-rotate-45 text-center px-2 font-bold' : ''}&quot;&gt;${step.label}&lt;/span&gt;
                                        &lt;/div&gt;
                                        ${i === 3 ? '&lt;span class=&quot;absolute left-[110%] top-1/2 -translate-y-1/2 text-[10px] text-green-600 font-bold whitespace-nowrap&quot;&gt;是 (Yes)&lt;/span&gt;' : ''}
                                        ${i &lt; qData.flow.receiver.length - 1 ? '&lt;span class=&quot;text-blue-300 leading-none py-1&quot;&gt;&darr;&lt;/span&gt;' : ''}
                                    &lt;/div&gt;
                                `).join('')}
                                &lt;!-- 接收端循环线：LED输出后回到判断框上方 --&gt;
                                &lt;div class=&quot;absolute -right-10 top-[255px] bottom-[20px] w-10 border-r-2 border-b-2 border-green-400 rounded-br-lg z-0&quot;&gt;
                                    &lt;div class=&quot;absolute top-0 right-0 w-10 border-t-2 border-green-400 rounded-tr-lg h-full&quot;&gt;&lt;/div&gt;
                                    &lt;span class=&quot;absolute -top-[125px] -left-1.5 text-green-500 text-xs&quot;&gt;▲&lt;/span&gt;
                                &lt;/div&gt;
                            &lt;/div&gt;
                            &lt;span class=&quot;mt-4 text-sm font-bold text-green-700 bg-green-50 px-4 py-1 rounded-full&quot;&gt;接收端订阅算法流程图&lt;/span&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                    &lt;button id=&quot;submit-drag&quot; onclick=&quot;checkDragFlow()&quot; class=&quot;btn-primary text-white py-3 rounded-xl font-bold opacity-50 cursor-not-allowed mt-4&quot; disabled&gt;提交流程图&lt;/button&gt;
                &lt;/div&gt;`;

            }

            container.innerHTML = html;
            anime({ targets: '#question-card', translateY: [20, 0], opacity: [0, 1], duration: 600, easing: 'easeOutCubic' });
        }

        function checkAnswer(userAnswer) {
            if (state.answered) return;
            state.answered = true;

            const qData = questionBank[`level${state.currentLevel}`][state.questionIndex];
            const isCorrect = userAnswer === qData.a;
            const btns = document.querySelectorAll('.option-btn');

            if (isCorrect) {
                // 单选和判断每题 5 分，共 10 题 50 分
                state.score += 5;
                state.correctCount++;
                showFeedback('🎉 太棒了！', true);
                playSound('correct');
            } else {
                showFeedback('💡 再想想哦', false);
                playSound('wrong');
                // 记录错题
                state.wrongQuestions.push({
                    q: qData.q,
                    userAnswer: qData.type === 'choice' ? qData.options[userAnswer] : (userAnswer ? '正确' : '错误'),
                    correctAnswer: qData.type === 'choice' ? qData.options[qData.a] : (qData.a ? '正确' : '错误'),
                    hint: qData.hint
                });
            }

            // 视觉反馈
            btns.forEach((btn, i) =&gt; {
                if (qData.type === 'choice') {
                    if (i === qData.a) btn.classList.add('correct-answer');
                    else if (i === userAnswer) btn.classList.add('wrong-answer');
                } else {
                    const val = i === 0; // true is index 0
                    if (val === qData.a) btn.classList.add('correct-answer');
                    else if (val === userAnswer) btn.classList.add('wrong-answer');
                }
            });

            // 显示解析
            const container = document.getElementById('question-card');
            const hintDiv = document.createElement('div');
            hintDiv.className = `mt-6 p-4 rounded-lg ${isCorrect ? 'bg-green-50 text-green-800' : 'bg-red-50 text-red-800'} text-sm italic`;
            hintDiv.innerHTML = `&lt;strong&gt;解析：&lt;/strong&gt;${qData.hint}`;
            container.appendChild(hintDiv);

            setTimeout(nextStep, 2000);
        }

        // 拖拽逻辑
        let dragData = {};
        function onDragStart(e) {
            e.dataTransfer.setData('text/plain', e.target.id);
        }
        function onDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('active');
        }
        function onDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('active');
            const id = e.dataTransfer.getData('text/plain');
            const draggableElement = document.getElementById(id);
            const dropzone = e.currentTarget;
            
            // 确保拖拽的是有效的元素且目标是空位
            if (draggableElement &amp;&amp; dropzone.classList.contains('drop-zone')) {
                // 如果空位已有内容，先将其放回待选区
                if (dropzone.children.length &gt; 0) {
                    const existingItem = dropzone.children[0];
                    document.getElementById('drag-items').appendChild(existingItem);
                }
                dropzone.innerHTML = '';
                dropzone.appendChild(draggableElement);
                dragData[dropzone.id] = id;
                checkDragComplete();
            }
        }
        function checkDragComplete() {
            const dragSlots = document.querySelectorAll('.drop-zone');
            const isComplete = Array.from(dragSlots).every(slot =&gt; dragData[slot.id]);
            const btn = document.getElementById('submit-drag');
            if (isComplete) {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.disabled = false;
            }
        }
        function checkDragFlow() {
            const qData = questionBank.level3[0];
            const allSlots = [...qData.flow.sender, ...qData.flow.receiver].filter(s =&gt; s.type === 'slot');
            const isAllCorrect = allSlots.every(s =&gt; dragData[s.id] === s.accept);
            
            if (isAllCorrect) {
                // 拖拽题 50 分，总分 100
                state.score += 50;
                state.correctCount++;
                showFeedback('🌟 流程图完美！', true);
                playSound('correct');
                animateDataFlow();
            } else {
                showFeedback('❌ 逻辑有误', false);
                playSound('wrong');
                // 记录拖拽错题
                state.wrongQuestions.push({
                    q: '算法流程图模拟',
                    userAnswer: '流程逻辑存在错误',
                    correctAnswer: '请参考正确流程图逻辑',
                    hint: '发送端：开始-&gt;连接-&gt;读取-&gt;上传-&gt;等待；接收端：开始-&gt;连接-&gt;订阅-&gt;判断-&gt;LED输出。'
                });
            }
            setTimeout(nextStep, 2500);
        }

        function animateDataFlow() {
            const zones = document.querySelectorAll('.drop-zone');
            zones.forEach((zone, i) =&gt; {
                anime({
                    targets: zone,
                    scale: [1, 1.1, 1],
                    backgroundColor: ['#fff', '#dcfce7', '#fff'],
                    delay: i * 300,
                    duration: 600
                });
            });
        }

        function nextStep() {
            state.questionIndex++;
            const levelKey = `level${state.currentLevel}`;
            
            if (state.questionIndex &gt;= questionBank[levelKey].length) {
                if (state.currentLevel &lt; 3) {
                    state.currentLevel++;
                    state.questionIndex = 0;
                    renderQuestion();
                } else {
                    showResult();
                }
            } else {
                renderQuestion();
            }
            document.getElementById('score-display').innerText = `得分: ${state.score}`;
        }

        async function showResult() {
            state.phase = GamePhase.RESULT;
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('status-bar').classList.add('hidden');
            const resultPage = document.getElementById('result-page');
            resultPage.classList.remove('hidden');

            // 准备发送数据
            const reportData = {
                studentName: state.studentName,
                score: state.score,
                correctCount: state.correctCount,
                totalQuestions: state.totalQuestions,
                wrongQuestions: state.wrongQuestions,
                submitTime: new Date().toLocaleString()
            };

            // 尝试使用表单提交方式，这种方式对跨域最友好
            try {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = 'https://quickform.cn/api/xrshcfb5cy';
                form.target = 'hidden_iframe';
                
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'data';
                input.value = JSON.stringify(reportData);
                form.appendChild(input);
                
                // 创建隐藏的 iframe 防止页面跳转
                let iframe = document.getElementById('hidden_iframe');
                if (!iframe) {
                    iframe = document.createElement('iframe');
                    iframe.id = 'hidden_iframe';
                    iframe.name = 'hidden_iframe';
                    iframe.style.display = 'none';
                    document.body.appendChild(iframe);
                }
                
                document.body.appendChild(form);
                form.submit();
                document.body.removeChild(form);
                console.log('数据已通过表单提交');
            } catch (e) {
                console.error('表单提交失败', e);
            }

            const accuracy = (state.correctCount / state.totalQuestions) * 100;
            const stars = state.score &gt;= 90 ? 3 : (state.score &gt;= 60 ? 2 : 1);
            
            document.getElementById('star-container').innerHTML = '⭐'.repeat(stars) + '空'.repeat(3-stars).replace(/空/g, '&lt;span class=&quot;opacity-20&quot;&gt;⭐&lt;/span&gt;');
            document.getElementById('result-title').innerText = state.score &gt;= 60 ? '挑战成功！' : '继续努力！';
            document.getElementById('result-stats').innerHTML = `
                &lt;div class=&quot;text-2xl font-bold text-blue-800 mb-2&quot;&gt;${state.studentName} 同学&lt;/div&gt;
                &lt;div class=&quot;text-4xl font-black text-orange-500 mb-4&quot;&gt;${state.score} 分&lt;/div&gt;
                &lt;div class=&quot;text-sm text-gray-500 mb-6&quot;&gt;正确题目：${state.correctCount} / ${state.totalQuestions}&lt;/div&gt;
                ${state.wrongQuestions.length &gt; 0 ? `
                    &lt;div class=&quot;text-left bg-gray-50 p-4 rounded-xl max-h-60 overflow-y-auto border border-gray-200&quot;&gt;
                        &lt;h4 class=&quot;font-bold text-red-600 mb-3 flex items-center gap-2&quot;&gt;
                            &lt;span&gt;📋 错题回顾与解析&lt;/span&gt;
                        &lt;/h4&gt;
                        ${state.wrongQuestions.map((wq, i) =&gt; `
                            &lt;div class=&quot;mb-4 pb-4 border-b border-gray-200 last:border-0&quot;&gt;
                                &lt;p class=&quot;text-sm font-bold text-gray-800 mb-1&quot;&gt;${i+1}. ${wq.q}&lt;/p&gt;
                                &lt;p class=&quot;text-xs text-red-500&quot;&gt;你的答案：${wq.userAnswer}&lt;/p&gt;
                                &lt;p class=&quot;text-xs text-green-600&quot;&gt;正确答案：${wq.correctAnswer}&lt;/p&gt;
                                &lt;p class=&quot;text-xs text-blue-600 mt-1 bg-blue-50 p-2 rounded&quot;&gt;解析：${wq.hint}&lt;/p&gt;
                            &lt;/div&gt;
                        `).join('')}
                    &lt;/div&gt;
                ` : '&lt;div class=&quot;text-green-600 font-bold py-4&quot;&gt;✨ 完美通关，没有错题！&lt;/div&gt;'}
            `;
            
            anime({
                targets: '#result-page',
                scale: [0.8, 1],
                opacity: [0, 1],
                duration: 1000,
                easing: 'easeOutElastic(1, .6)'
            });
        }

        function showFeedback(text, isCorrect) {
            const pop = document.getElementById('feedback-pop');
            pop.innerText = text;
            pop.style.color = isCorrect ? '#22c55e' : '#ef4444';
            anime({
                targets: pop,
                opacity: [0, 1, 0],
                translateY: [0, -100],
                scale: [0.5, 1.2],
                duration: 1500,
                easing: 'easeOutExpo'
            });
        }

        function playSound(type) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            if (type === 'correct') {
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } else {
                osc.type = 'square';
                osc.frequency.setValueAtTime(220, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.start();
                osc.stop(ctx.currentTime + 0.4);
            }

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
