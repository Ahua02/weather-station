    &lt;title&gt;校园智能气象站 - SIoT 闯关课件&lt;/title&gt;
    &lt;script src=&quot;https://metis-online.fbcontent.cn/metis-misc/zgLDUdmazTYc0B4K6Cor.js&quot;&gt;&lt;/script&gt;
    &lt;script src=&quot;https://metis-online.fbcontent.cn/metis-misc/zZZY40t7WJC7UdQCPACm.js&quot;&gt;&lt;/script&gt;
    &lt;style&gt;
        @font-face {
            font-family: 'Pixel';
            src: url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&amp;display=swap');
        }
        :root {
            --pixel-bg: #2c3e50;
            --pixel-primary: #3498db;
            --pixel-accent: #e67e22;
            --pixel-success: #27ae60;
            --pixel-border: #000;
        }
        body {
            background-color: #87ceeb;
            font-family: 'ZCOOL KuaiLe', cursive, sans-serif;
            margin: 0;
            overflow: hidden;
            image-rendering: pixelated;
        }
        .pixel-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: url('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/JALdWsoYqHziLgXoMx5TSX.jpg') no-repeat center center;
            background-size: cover;
        }
        /* SIoT 风格导航栏 */
        .siot-nav {
            background: #333;
            color: white;
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            border-bottom: 4px solid var(--pixel-border);
            z-index: 100;
        }
        .nav-item {
            cursor: pointer;
            padding: 5px 10px;
            border: 2px solid transparent;
        }
        .nav-item:hover, .nav-item.active {
            background: #555;
            border: 2px solid #fff;
        }
        .level-badge {
            margin-left: auto;
            background: var(--pixel-accent);
            padding: 2px 10px;
            border: 2px solid #fff;
        }

        /* 弹窗/面板样式 */
        .panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #f0f0f0;
            border: 4px solid var(--pixel-border);
            box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
            width: 85%;
            max-width: 900px;
            max-height: 85vh;
            display: none;
            flex-direction: column;
            z-index: 50;
        }
        .panel-header {
            background: var(--pixel-primary);
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            border-bottom: 4px solid var(--pixel-border);
        }
        .panel-content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        /* 像素风格按钮 */
        .pixel-btn {
            background: var(--pixel-accent);
            color: white;
            border: 4px solid var(--pixel-border);
            padding: 8px 16px;
            cursor: pointer;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
            margin: 5px;
            display: inline-block;
        }
        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }

        /* 列表样式 */
        .data-list {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .data-list th, .data-list td {
            border: 2px solid var(--pixel-border);
            padding: 8px;
            text-align: left;
        }
        .data-list th { background: #ddd; }

        /* 气象站实时显示 */
        .weather-display {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.9);
            border: 4px solid var(--pixel-border);
            padding: 15px;
            width: 220px;
        }
        .weather-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .weather-icon { width: 24px; height: 24px; }

        /* 全局消息看板 */
        .dashboard-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            color: #00ff00;
            border: 4px solid var(--pixel-border);
            padding: 10px;
            width: 350px;
            height: 250px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            overflow-y: auto;
            z-index: 40;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
        }
        .dashboard-title {
            border-bottom: 1px solid #00ff00;
            margin-bottom: 8px;
            font-weight: bold;
            padding-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .log-entry { margin-bottom: 4px; line-height: 1.2; }
        .log-pub { color: #00ff00; }
        .log-sub { color: #00ffff; }

        /* 拖拽题样式 */
        .drag-container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            gap: 10px;
        }
        .drag-item {
            background: #fff;
            border: 2px solid #000;
            padding: 10px;
            cursor: move;
            user-select: none;
            font-size: 14px;
            width: 120px;
            text-align: center;
        }
        .drop-zone {
            background: #eee;
            border: 2px dashed #666;
            min-height: 80px;
            width: 180px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .drop-zone-title { font-weight: bold; margin-bottom: 5px; font-size: 14px; }

        /* 消息气泡动画 */
        .msg-bubble {
            position: absolute;
            background: white;
            border: 2px solid black;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            z-index: 200;
        }

        /* 闯关特定样式 */
        .wildcard-info {
            background: #fff;
            border: 2px dashed var(--pixel-primary);
            padding: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .code-block {
            background: #333;
            color: #fff;
            padding: 5px;
            font-family: monospace;
        }

        .wildcard-hint-bar {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid var(--pixel-border);
            padding: 8px 20px;
            z-index: 80;
            display: none;
            font-size: 14px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
            max-width: 80%;
            text-align: center;
        }
        .wildcard-hint-bar b { color: var(--pixel-accent); }
        
        /* 密码框置顶 */
        #unlock-panel { z-index: 200; }
        
        /* 第3关数据展示增强 */
        .match-tag {
            display: inline-block;
            padding: 2px 5px;
            background: #e0f2f1;
            border: 1px solid #009688;
            border-radius: 3px;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        .copy-hint {
            cursor: pointer;
            text-decoration: underline;
            color: var(--pixel-primary);
        }
        .copy-hint:hover {
            color: var(--pixel-accent);
        }
        /* 引导页 */
        #intro-panel { display: flex; }
    &lt;/style&gt;

    function handleLogin() {
        const nameInput = document.getElementById('student-name-input');

        state.isLoggedIn = true;
        document.getElementById('login-overlay').style.display = 'none';
        reportData(1, 'Started');
    }

    async function reportData(level, status) {
        if (!state.studentId) return;
        
        const formData = new FormData();
        formData.append('studentId', state.studentId);
        formData.append('level', String(level));
        formData.append('status', status);
        formData.append('timestamp', new Date().toLocaleString('zh-CN'));
        
        try {
            await fetch('https://quickform.cn/api/j7j1kzehoe', {
                method: 'POST',
                body: formData
            });
            console.log(`进度已提交: 第${level}关 - ${status}`);
        } catch (e) { console.error('数据提交失败', e); }
    }

    function showPanel(type) {
        if (state.inQuiz) {
            alert('请先完成第1关的角色匹配挑战！');
            return;
        }
        document.querySelectorAll('.panel').forEach(p =&gt; p.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n =&gt; n.classList.remove('active'));
        const panel = document.getElementById(type + '-panel');
        if (panel) panel.style.display = 'flex';
        if (event &amp;&amp; event.currentTarget) event.currentTarget.classList.add('active');
        if (type === 'project') renderTopics();
        if (type === 'send' || type === 'subscribe') updateSelects();
    }

    function closePanel(id) { document.getElementById(id).style.display = 'none'; }

    function renderTopics() {
        const body = document.getElementById('topic-body');
        if (state.currentLevel === 3) {
            body.innerHTML = state.topics.map(t =&gt; `
                &lt;tr&gt;
                    &lt;td&gt;${t.name}&lt;/td&gt;
                    &lt;td id=&quot;td-val-${t.name.replace(/\//g, '-')}&quot; class=&quot;font-mono&quot;&gt;${t.lastValue || '--'}&lt;/td&gt;
                    &lt;td id=&quot;td-status-${t.name.replace(/\//g, '-')}&quot; class=&quot;text-xs&quot;&gt;${t.subscribed ? '&lt;span class=&quot;text-green-600&quot;&gt;已订阅&lt;/span&gt;' : '&lt;span class=&quot;text-gray-400&quot;&gt;未订阅&lt;/span&gt;'}&lt;/td&gt;
                &lt;/tr&gt;
            `).join('');
        } else {
            body.innerHTML = state.topics.map(t =&gt; `
                &lt;tr&gt;&lt;td&gt;${t.name} (${t.label})&lt;/td&gt;&lt;td&gt;${t.count}&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;text-blue-500 cursor-pointer&quot;&gt;查看&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
            `).join('');
        }
        if (state.taskCompleted &amp;&amp; state.currentLevel === 2) {
            document.getElementById('next-level-trigger').classList.remove('hidden');
        }
    }

    function updateSelects() {
        const options = state.topics.map(t =&gt; `&lt;option value=&quot;${t.name}&quot;&gt;${t.label} (${t.name})&lt;/option&gt;`).join('');
        const sendSelect = document.getElementById('send-topic-select');
        if (sendSelect) sendSelect.innerHTML = options;
        if (state.currentLevel === 2) {
            const subSelect = document.getElementById('sub-topic-select');
            if (subSelect) subSelect.innerHTML = options;
        }
    }

    function mqttMatch(filter, topic) {
        const filterArray = filter.split('/');
        const topicArray = topic.split('/');
        for (let i = 0; i &lt; filterArray.length; i++) {
            const f = filterArray[i];
            const t = topicArray[i];
            if (f === '#') return true;
            if (f !== '+' &amp;&amp; f !== t) return false;
        }
        return filterArray.length === topicArray.length;
    }

    function copyToSub(text) {
        const input = document.getElementById('sub-topic-input');
        if (input) input.value = text;
    }

    function clearSubscriptions() {
        state.subscribedFilters = [];
        state.receivedTopics = new Set();
        document.getElementById('sub-messages').innerHTML = '等待消息中...';
        if (state.currentLevel === 3) {
            state.topics.forEach(t =&gt; t.subscribed = false);
            renderTopics();
        }
        addLog('已清空所有订阅', 'log-sub');
    }

    function subscribeTopic() {
        let filter = state.currentLevel === 2 ? document.getElementById('sub-topic-select').value : document.getElementById('sub-topic-input').value.trim();
        if (!filter) return;
        if (!state.subscribedFilters.includes(filter)) {
            state.subscribedFilters.push(filter);
            addLog(`订阅成功: ${filter}`, 'log-sub');
            
            if (state.currentLevel === 3) {
                // 更新数据列表中的订阅状态
                state.topics.forEach(t =&gt; {
                    if (mqttMatch(filter, t.name)) t.subscribed = true;
                });
                renderTopics();
                startAutoSimulation();
            }
            alert(`已成功订阅: ${filter}`);
        }
    }

    let simInterval = null;
    function startAutoSimulation() {
        if (simInterval) return;
        simInterval = setInterval(() =&gt; {
            if (state.currentLevel !== 3) {
                clearInterval(simInterval);
                return;
            }
            // 随机选择一个主题发送模拟数据
            const topic = state.topics[Math.floor(Math.random() * state.topics.length)];
            const val = (Math.random() * 10 + 20).toFixed(1);
            simulatePublish(topic.name, val);
        }, 3000);
    }

    function simulatePublish(topicName, content) {
        const topic = state.topics.find(t => t.name === topicName);
        topic.lastValue = content;
        addLog(`[模拟PUB] ${topicName} -> ${content}`, 'log-pub');
        
        let received = false;
        state.subscribedFilters.forEach(filter => {
            if (mqttMatch(filter, topicName)) {
                received = true;
                state.receivedTopics.add(topicName);
                const subBox = document.getElementById('sub-messages');
                let matchInfo = `<span class="match-tag">匹配成功: ${filter}</span>`;
                const msgHtml = `<div class="mb-2 border-b border-gray-100 pb-1">
                    ${matchInfo}
                    <span class="text-gray-400">[${new Date().toLocaleTimeString()}]</span> 
                    <b class="text-blue-600">${topicName}</b>: ${content}
                </div>`;
                subBox.innerHTML = (subBox.innerHTML.includes('等待') ? '' : subBox.innerHTML) + msgHtml;
                subBox.scrollTop = subBox.scrollHeight;
                addLog(`[SUB] 匹配订阅 ${filter} 收到数据: ${content}`, 'log-sub');
            }
        });
        renderTopics();
        
        // 第3关完成检测：收到至少3条不同主题的消息
        console.log('[DEBUG] currentLevel:', state.currentLevel, 'received:', received, 'receivedTopics.size:', state.receivedTopics.size, 'level3Completed:', state.level3Completed);
        if (received && state.currentLevel === 3 && state.receivedTopics.size >= 3 && !state.level3Completed) {
            console.log('[DEBUG] 第3关任务完成！');
            state.level3Completed = true;
            reportData(3, 'Completed');
            setTimeout(() => {
                alert('恭喜完成第3关通配符订阅挑战！\n你已掌握MQTT数据订阅的核心技能！');
            }, 500);
        }
    }

    function publishMessage() {
        const topicName = document.getElementById('send-topic-select').value;
        const content = document.getElementById('send-msg-content').value;
        if (!content) return;
        const topic = state.topics.find(t =&gt; t.name === topicName);
        topic.count++;
        addLog(`[PUB] ${topicName} -&gt; ${content}`, 'log-pub');
        
        let received = false;
        state.subscribedFilters.forEach(filter =&gt; {
            if (mqttMatch(filter, topicName)) {
                received = true;
                const subBox = document.getElementById('sub-messages');
                
                // 增强第3关展示：显示匹配标签
                let matchInfo = &quot;&quot;;
                if(state.currentLevel === 3) {
                    matchInfo = `&lt;span class=&quot;match-tag&quot;&gt;匹配成功: ${filter}&lt;/span&gt;`;
                } else {
                    matchInfo = `&lt;span class=&quot;match-tag&quot; style=&quot;background:#e3f2fd; border-color:#2196f3; color:#1976d2;&quot;&gt;收到订阅: ${filter}&lt;/span&gt;`;
                }

                const msgHtml = `&lt;div class=&quot;mb-2 border-b border-gray-100 pb-1&quot;&gt;
                    ${matchInfo}
                    &lt;span class=&quot;text-gray-400&quot;&gt;[${new Date().toLocaleTimeString()}]&lt;/span&gt; 
                    &lt;b class=&quot;text-blue-600&quot;&gt;${topicName}&lt;/b&gt;: ${content}
                &lt;/div&gt;`;
                
                subBox.innerHTML = (subBox.innerHTML.includes('等待') ? '' : subBox.innerHTML) + msgHtml;
                subBox.scrollTop = subBox.scrollHeight;
                addLog(`[SUB] 匹配订阅 ${filter} 收到数据: ${content}`, 'log-sub');
                state.receivedTopics.add(topicName);
                
                // 实时更新右侧气象站显示
                if (topicName.includes('Temp')) document.getElementById('live-temp').innerText = content;
                if (topicName.includes('Humi')) document.getElementById('live-humi').innerText = content;
                if (topicName.includes('Wind')) document.getElementById('live-wind').innerText = content;
                if (topicName.includes('PM25')) document.getElementById('live-pm25').innerText = content;
                if (topicName.includes('UV')) document.getElementById('live-uv').innerText = content;
            }
        });

        if (received &amp;&amp; state.currentLevel === 2 &amp;&amp; state.receivedTopics.size &gt;= 2) {
            state.taskCompleted = true;
            reportData(2, 'Completed');
            renderTopics();
            setTimeout(() =&gt; {
                if(confirm('第2关任务达成！是否进入第3关挑战？')) {
                    enterLevel3();
                }
            }, 500);
        }
        
        if (received) {
            if (topicName.includes('Temp')) document.getElementById('live-temp').innerText = content;
            if (topicName.includes('Humi')) document.getElementById('live-humi').innerText = content;
            if (topicName.includes('Wind')) document.getElementById('live-wind').innerText = content;
            if (topicName.includes('PM25')) document.getElementById('live-pm25').innerText = content;
            if (topicName.includes('UV')) document.getElementById('live-uv').innerText = content;
        }
        createMessageAnimation(content);
    }

    // 拖拽逻辑
    function initDragAndDrop() {
        const items = document.querySelectorAll('.drag-item');
        const zones = document.querySelectorAll('.drop-zone');
        items.forEach(item =&gt; {
            item.addEventListener('dragstart', e =&gt; e.dataTransfer.setData('text/plain', e.target.innerText + '|' + e.target.dataset.role));
        });
        zones.forEach(zone =&gt; {
            zone.addEventListener('dragover', e =&gt; e.preventDefault());
            zone.addEventListener('drop', e =&gt; {
                e.preventDefault();
                const data = e.dataTransfer.getData('text/plain');
                if(!data) return;
                const [text, role] = data.split('|');
                
                // 如果当前区域已有内容，将其放回备选区
                const existingItems = zone.querySelectorAll('.drag-item');
                existingItems.forEach(item =&gt; {
                    const backItem = document.createElement('div');
                    backItem.className = 'drag-item';
                    backItem.draggable = true;
                    backItem.innerText = item.innerText;
                    backItem.dataset.role = item.dataset.role;
                    backItem.addEventListener('dragstart', e =&gt; e.dataTransfer.setData('text/plain', e.target.innerText + '|' + e.target.dataset.role));
                    document.getElementById('drag-items').appendChild(backItem);
                    item.remove();
                });

                const newItem = document.createElement('div');
                newItem.className = 'drag-item mb-1';
                newItem.innerText = text;
                newItem.dataset.role = role;
                zone.appendChild(newItem);
                document.querySelectorAll('.drag-item').forEach(i =&gt; { if(i.innerText === text &amp;&amp; i.parentElement.id === 'drag-items') i.remove(); });
            });
        });
    }

        closePanel('intro-panel');
        document.getElementById('nav-project').style.display = 'none';
        document.getElementById('nav-subscribe').style.display = 'none';
        document.getElementById('nav-send').style.display = 'none';

        initDragAndDrop();

    function resetQuiz() {
        const dragItems = document.getElementById('drag-items');
        dragItems.innerHTML = `
            &lt;div class=&quot;drag-item&quot; draggable=&quot;true&quot; data-role=&quot;pub&quot;&gt;采集并上传数据&lt;/div&gt;
            &lt;div class=&quot;drag-item&quot; draggable=&quot;true&quot; data-role=&quot;sub&quot;&gt;接收并显示数据&lt;/div&gt;
            &lt;div class=&quot;drag-item&quot; draggable=&quot;true&quot; data-role=&quot;broker&quot;&gt;转发与管理消息&lt;/div&gt;
        `;
        document.querySelectorAll('.drop-zone').forEach(zone =&gt; {
            const title = zone.querySelector('.drop-zone-title');
            zone.innerHTML = '';
            zone.appendChild(title);
        });
        initDragAndDrop();
    }

    function checkQuiz() {
        const zones = document.querySelectorAll('.drop-zone');
        let allCorrect = true;
        zones.forEach(zone =&gt; {
            const target = zone.dataset.target;
            const items = zone.querySelectorAll('.drag-item');
            if (items.length === 0) allCorrect = false;
            items.forEach(item =&gt; { if (item.dataset.role !== target) allCorrect = false; });
        });
        if (allCorrect) {
            alert('太棒了！匹配完全正确！进入第2关。');
            reportData(1, 'Completed');
            state.inQuiz = false;
            state.currentLevel = 2;
            document.getElementById('level-num').innerText = '2';
            document.getElementById('nav-project').style.display = 'block';
            document.getElementById('nav-subscribe').style.display = 'block';
            document.getElementById('nav-send').style.display = 'block';
            closePanel('quiz-panel');
            document.getElementById('level2-intro-panel').style.display = 'flex';
            // 自动弹出订阅窗口
            setTimeout(() =&gt; {
                showPanel('subscribe');
            }, 1000);
        } else {
            alert('匹配有误，请重新尝试！');
            resetQuiz();
        }
    }

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
