                    &lt;button onclick=&quot;sendMessage()&quot; class=&quot;w-full pixel-btn pixel-btn-primary py-4 font-bold&quot;&gt;发送消息&lt;/button&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;

        &lt;!-- 角色 B --&gt;
        &lt;section id=&quot;role-b-screen&quot; class=&quot;hidden&quot;&gt;
            &lt;div class=&quot;task-banner task-banner-b&quot;&gt;🖥️ 任务：作为代理者，审核并手动转发匹配消息。&lt;/div&gt;
            &lt;div class=&quot;grid grid-cols-1 md:grid-cols-3 gap-6&quot;&gt;
                &lt;div class=&quot;pixel-box p-6&quot;&gt;
                    &lt;h3 class=&quot;font-bold text-xs mb-4&quot;&gt;A 发送的消息&lt;/h3&gt;
                    &lt;div id=&quot;b-incoming&quot; class=&quot;space-y-3 h-64 overflow-y-auto&quot;&gt;&lt;/div&gt;
                &lt;/div&gt;
                &lt;div class=&quot;pixel-box p-6&quot;&gt;
                    &lt;h3 class=&quot;font-bold text-xs mb-4&quot;&gt;C 订阅的主题&lt;/h3&gt;
                    &lt;div id=&quot;b-subscriptions&quot; class=&quot;flex flex-wrap gap-2&quot;&gt;&lt;/div&gt;
                &lt;/div&gt;
                &lt;div class=&quot;pixel-box p-6&quot;&gt;
                    &lt;h3 class=&quot;font-bold text-xs mb-4&quot;&gt;已转发给 C&lt;/h3&gt;
                    &lt;div id=&quot;b-outgoing&quot; class=&quot;space-y-3 h-64 overflow-y-auto&quot;&gt;&lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;

        &lt;!-- 角色 C --&gt;
        &lt;section id=&quot;role-c-screen&quot; class=&quot;hidden&quot;&gt;
            &lt;div class=&quot;task-banner task-banner-c&quot;&gt;👂 任务：订阅 &lt;strong&gt;2个&lt;/strong&gt; 主题，刷新接收消息。&lt;/div&gt;
            &lt;div class=&quot;grid grid-cols-1 md:grid-cols-3 gap-8&quot;&gt;
                &lt;div class=&quot;pixel-box p-6&quot;&gt;
                    &lt;h3 class=&quot;font-bold mb-4&quot;&gt;1. 订阅主题&lt;/h3&gt;
                    &lt;div id=&quot;topic-list-c&quot; class=&quot;space-y-3&quot;&gt;&lt;/div&gt;
                    &lt;button id=&quot;sub-btn&quot; onclick=&quot;confirmSubscription()&quot; class=&quot;w-full mt-6 pixel-btn bg-blue-600 text-white&quot;&gt;确认订阅&lt;/button&gt;
                &lt;/div&gt;
                &lt;div class=&quot;md:col-span-2 pixel-box p-8&quot;&gt;
                    &lt;div class=&quot;flex justify-between items-center mb-4&quot;&gt;
                        &lt;h3 class=&quot;font-bold&quot;&gt;2. 接收到的消息&lt;/h3&gt;
                        &lt;button onclick=&quot;syncData()&quot; class=&quot;pixel-btn bg-green-500 text-xs&quot;&gt;刷新&lt;/button&gt;
                    &lt;/div&gt;
                    &lt;div id=&quot;msg-list-c&quot; class=&quot;space-y-4&quot;&gt;&lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;
    &lt;/div&gt;

    &lt;script&gt;
        const TOPICS = [
            { id: 'game', name: '🎮 游戏攻略', color: '#FF6B6B' },
            { id: 'tech', name: '🤖 AI黑科技', color: '#4ECDC4' },
            { id: 'school', name: '🏫 校园趣事', color: '#FFD93D' },
            { id: 'music', name: '🎵 流行音乐', color: '#6C5CE7' },
            { id: 'sport', name: '🏀 运动健身', color: '#A8E6CF' }
        ];
        const API_URL = 'https://quickform.cn/api/mz86mfrqui';
        
        // 从localStorage恢复状态
        function loadState() {
            const saved = localStorage.getItem('weather_student_state');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    return { ...parsed, subsC: new Set(parsed.subsC || []) };
                } catch(e) {}
            }
            return { group: null, role: null, name: null, selectedTopicA: null, subsC: new Set(), isSubscribed: false };
        }
        
        function saveState() {
            const toSave = { ...state, subsC: Array.from(state.subsC) };
            localStorage.setItem('weather_student_state', JSON.stringify(toSave));
        }
        
        let state = loadState();
        
        // 页面加载时检查是否已登录
        window.onload = function() {
            if (state.group && state.role && state.name) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('identity-text').textContent = `组 ${state.group} - 角色 ${state.role} (${state.name})`;
                initRoleScreen();
            }
        };

        function login() {
            const name = document.getElementById('student-name').value.trim();
            const id = parseInt(document.getElementById('student-id').value);
            if (!name || isNaN(id) || id &lt; 1 || id &gt; 54) return alert('请输入正确信息');
            state.name = name;
            state.group = Math.ceil(id / 3);
            state.role = ['A', 'B', 'C'][(id - 1) % 3];
            saveState();
            showRoleTip();
        }

        function showRoleTip() {
            const modal = document.getElementById('role-tip-modal');
            const content = document.getElementById('role-tip-content');
            const tips = {
                'A': '编写并发送消息。选择主题，输入内容并发送。',
                'B': '审核并手动转发匹配消息。查看 A 的消息并根据 C 的订阅转发。',
                'C': '订阅 &lt;strong&gt;2个&lt;/strong&gt; 感兴趣的主题，等待并刷新接收消息。'
            };
            content.innerHTML = `&lt;div class=&quot;p-4 border-2 border-black bg-gray-50&quot;&gt;&lt;p class=&quot;font-bold mb-2&quot;&gt;角色 ${state.role}&lt;/p&gt;&lt;p&gt;${tips[state.role]}&lt;/p&gt;&lt;/div&gt;`;
            modal.classList.add('active');
        }

        function startChallenge() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('role-tip-modal').classList.remove('active');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('identity-text').textContent = `组 ${state.group} - 角色 ${state.role} (${state.name})`;
            saveState();
            initRoleScreen();
        }

        function initRoleScreen() {
            if (state.role === 'A') {
                document.getElementById('role-a-screen').classList.remove('hidden');
                const list = document.getElementById('topic-list-a');
                TOPICS.forEach(t =&gt; {
                    const btn = document.createElement('button');
                    btn.className = 'w-full text-left p-3 border-2 border-gray-100 mb-2';
                    btn.innerHTML = `&lt;span&gt;${t.name}&lt;/span&gt;`;
                    btn.onclick = () =&gt; {
                        state.selectedTopicA = t.id;
                        document.querySelectorAll('#topic-list-a button').forEach(b =&gt; b.style.borderColor = '#eee');
                        btn.style.borderColor = '#000';
                    };
                    list.appendChild(btn);
                });
            } else if (state.role === 'B') {
                document.getElementById('role-b-screen').classList.remove('hidden');
            } else if (state.role === 'C') {
                document.getElementById('role-c-screen').classList.remove('hidden');
                const list = document.getElementById('topic-list-c');
                TOPICS.forEach(t =&gt; {
                    const label = document.createElement('label');
                    label.className = 'flex items-center p-3 border-2 border-gray-100 mb-2 cursor-pointer';
                    label.innerHTML = `&lt;input type=&quot;checkbox&quot; class=&quot;mr-3&quot; onchange=&quot;toggleSub('${t.id}')&quot;&gt;&lt;span&gt;${t.name}&lt;/span&gt;`;
                    list.appendChild(label);
                });
            }
            setInterval(syncData, 2000);
        }

        async function postData(data) {
            try { await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...data, group: state.group, timestamp: Date.now() }) }); } catch(e) {}
        }

        function sendMessage() {
            const content = document.getElementById('msg-input').value.trim();
            if (!state.selectedTopicA || !content) return alert('请选择主题并输入内容');
            postData({ type: 'message', topicId: state.selectedTopicA, content, sender: state.name });
            document.getElementById('msg-input').value = '';
            alert('发送成功！');
        }

        function toggleSub(id) { if (state.subsC.has(id)) state.subsC.delete(id); else state.subsC.add(id); }

        function confirmSubscription() {
            if (state.subsC.size === 0) return alert('请选择主题');
            postData({ type: 'subscription', topics: Array.from(state.subsC) });
            state.isSubscribed = true;
            document.getElementById('sub-btn').disabled = true;
            document.getElementById('sub-btn').textContent = '已订阅';
        }

        async function syncData() {
            try {
                const res = await fetch(API_URL);
                const json = await res.json();
                const records = json.submissions || json.data || [];
                const groupRecords = records.filter(r =&gt; r.group === state.group);
                
                if (state.role === 'B') renderB(groupRecords);
                if (state.role === 'C') renderC(groupRecords);
            } catch(e) {}
        }

        function renderB(records) {
            const msgs = records.filter(r =&gt; r.type === 'message');
            const subs = records.find(r =&gt; r.type === 'subscription')?.topics || [];
            const forwards = records.filter(r =&gt; r.type === 'forward').map(r =&gt; r.msgId);

            document.getElementById('b-incoming').innerHTML = msgs.map(m =&gt; `
                &lt;div class=&quot;p-2 border-2 border-black mb-2 text-xs&quot;&gt;
                    &lt;p class=&quot;font-bold&quot;&gt;${TOPICS.find(t =&gt; t.id === m.topicId).name}&lt;/p&gt;
                    &lt;p&gt;${m.content}&lt;/p&gt;
                    ${!forwards.includes(m.timestamp) ? `&lt;button onclick=&quot;forwardMsg('${m.timestamp}', '${m.topicId}')&quot; class=&quot;mt-2 bg-orange-500 text-white px-2 py-1&quot;&gt;转发&lt;/button&gt;` : '&lt;span class=&quot;text-green-600&quot;&gt;已转发&lt;/span&gt;'}
                &lt;/div&gt;
            `).join('');
            document.getElementById('b-subscriptions').innerHTML = subs.map(s =&gt; `&lt;span class=&quot;px-2 py-1 bg-blue-100 border border-blue-300 text-xs&quot;&gt;${TOPICS.find(t =&gt; t.id === s).name}&lt;/span&gt;`).join('');
            document.getElementById('b-outgoing').innerHTML = msgs.filter(m =&gt; forwards.includes(m.timestamp)).map(m =&gt; `&lt;div class=&quot;p-2 border-2 border-green-500 mb-2 text-xs&quot;&gt;${m.content}&lt;/div&gt;`).join('');
        }

        function forwardMsg(id, topicId) {
            postData({ type: 'forward', msgId: id, topicId });
        }

        function renderC(records) {
            const forwards = records.filter(r =&gt; r.type === 'forward').map(r =&gt; r.msgId);
            const msgs = records.filter(r =&gt; r.type === 'message' &amp;&amp; forwards.includes(r.timestamp) &amp;&amp; state.subsC.has(r.topicId));
            document.getElementById('msg-list-c').innerHTML = msgs.map(m =&gt; `&lt;div class=&quot;p-4 border-2 border-black bg-white&quot;&gt;&lt;p class=&quot;text-xs font-bold text-blue-600&quot;&gt;${TOPICS.find(t =&gt; t.id === m.topicId).name}&lt;/p&gt;&lt;p&gt;${m.content}&lt;/p&gt;&lt;/div&gt;`).join('');
        }
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
