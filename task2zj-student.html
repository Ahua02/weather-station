    &lt;meta charset=&quot;UTF-8&quot;&gt;
    &lt;meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;&gt;
    &lt;title&gt;消息传送大挑战 - 沉浸式互动课堂&lt;/title&gt;
    &lt;script src=&quot;https://metis-online.fbcontent.cn/metis-misc/zgLDUdmazTYc0B4K6Cor.js&quot;&gt;&lt;/script&gt;
    &lt;script src=&quot;https://metis-online.fbcontent.cn/metis-misc/zZZY40t7WJC7UdQCPACm.js&quot;&gt;&lt;/script&gt;
    &lt;style&gt;
        @font-face {
            font-family: 'PixelFont';
            src: url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        }

        :root {
            --primary: #FF5600;
            --bg-light: #F4F3EC;
            --text-dark: #0C0302;
            --text-gray: #74706E;
            --pixel-border: 4px;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: 'Press Start 2P', &quot;PingFang SC&quot;, cursive;
            image-rendering: pixelated;
            overflow-x: hidden;
        }

        /* 像素风边框通用样式 */
        .pixel-box {
            position: relative;
            border: var(--pixel-border) solid #000;
            background: white;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
        }

        .pixel-btn {
            position: relative;
            border: var(--pixel-border) solid #000;
            padding: 10px 20px;
            background: #fff;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 4px 4px 0 #000;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }

        .pixel-btn-primary {
            background: var(--primary);
            color: white;
        }

        .group-tag {
            display: inline-block;
            padding: 4px 8px;
            border: 2px solid #000;
            font-size: 0.7rem;
            font-weight: bold;
            color: white;
        }

        /* 角色卡片样式 */
        .role-card {
            transition: all 0.1s;
            border: var(--pixel-border) solid #eee;
        }
        .role-active {
            border-color: #000;
            background-color: #fff !important;
            box-shadow: 4px 4px 0 var(--primary);
        }

        /* 消息气泡 */
        .msg-bubble {
            border: 3px solid #000;
            position: relative;
            background: #fff;
            padding: 10px;
            margin-bottom: 10px;
        }

        /* 教师端网格 */
        .teacher-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .group-detail-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none; /* 默认隐藏 */
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .group-detail-modal.active {
            display: flex; /* 激活时显示 */
        }

        .detail-content {
            max-width: 800px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            background: var(--bg-light);
        }

        /* 进度条像素化 */
        .pixel-progress {
            height: 12px;
            border: 2px solid #000;
            background: #eee;
            overflow: hidden;
        }
        .pixel-progress-bar {
            height: 100%;
            background: var(--primary);
        }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 标题字号调整（像素字体较大） */
        h1 { font-size: 1.8rem !important; line-height: 2.4rem; }
        h2 { font-size: 1.5rem !important; }
        h3 { font-size: 1.2rem !important; }
        p, span, div, button, label, input, textarea { font-size: 0.9rem; }
        .text-[10px] { font-size: 0.85rem !important; }
        .text-[8px] { font-size: 0.75rem !important; }
        .text-[6px] { font-size: 0.65rem !important; }
        
        /* 任务提示条样式 */
        .task-banner {
            width: 100%;
            padding: 15px;
            border: var(--pixel-border) solid #000;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .task-banner-a { background: #FFF7ED; border-color: #EA580C; color: #9A3412; }
        .task-banner-b { background: #F0FDF4; border-color: #16A34A; color: #166534; }
        .task-banner-c { background: #EFF6FF; border-color: #2563EB; color: #1E40AF; }
        /* 登录界面样式 */
        .login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-light);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
        }
        .input-field {
            width: 100%;
            padding: 12px;
            border: var(--pixel-border) solid #000;
            outline: none;
            margin-bottom: 15px;
            font-family: inherit;
        }
        .group-result {
            margin-top: 20px;
            padding: 15px;
            border: 2px dashed var(--primary);
            background: #fff;
            display: none;
        }
        /* 角色提示弹窗 */
        .role-tip-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        /* 教师登录弹窗 */
        #teacher-login-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 3000; /* 确保在最顶层 */
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #teacher-login-modal.active {
            display: flex;
        }
    &lt;/style&gt;

    &lt;script&gt;
        // --- 配置与数据 ---
        const TOPICS = [
            { id: 'game', name: '🎮 游戏攻略', color: '#FF6B6B' },
            { id: 'tech', name: '🤖 AI黑科技', color: '#4ECDC4' },
            { id: 'school', name: '🏫 校园趣事', color: '#FFD93D' },
            { id: 'music', name: '🎵 流行音乐', color: '#6C5CE7' },
            { id: 'sport', name: '🏀 运动健身', color: '#A8E6CF' }
        ];

        const GROUP_COLORS = [
            '#FF5600', '#3B82F6', '#10B981', '#F59E0B', '#8B5CF6', 
            '#EC4899', '#06B6D4', '#84CC16', '#6366F1', '#D946EF',
            '#14B8A6', '#F97316', '#EF4444', '#64748B', '#A855F7',
            '#0EA5E9', '#22C55E'
        ];

        let state = {
            currentGroup: null,
            currentRole: null,
            selectedTopicA: null,
            subscriptionsC: new Set(),
            messages: [] // { fromGroup, topicId, content, timestamp }
        };

        // --- 角色分组逻辑 ---
        function checkGroup() {
            const name = document.getElementById('student-name').value.trim();
            const id = parseInt(document.getElementById('student-id').value);

            if (!name || isNaN(id) || id &lt; 1 || id &gt; 54) {
                alert('请输入正确的姓名和学号（1-54）！');
                return;
            }

            // 分组规则：1-3号为1组(A,B,C)，4-6号为2组(A,B,C)...
            const groupNum = Math.ceil(id / 3);
            const roleIndex = (id - 1) % 3;
            const roles = ['A', 'B', 'C'];
            const roleName = roles[roleIndex];

            state.currentGroup = groupNum;
            state.currentRole = roleName;

            const resultDiv = document.getElementById('group-result');
            const resultText = document.getElementById('result-text');
            resultText.innerHTML = `第 ${groupNum} 组 - 角色 ${roleName}`;
            resultDiv.style.display = 'block';
        }

        function confirmGroup() {
            document.getElementById('login-screen').style.display = 'none';
            showRoleTip();
        }

        function showRoleTip() {
            const modal = document.getElementById('role-tip-modal');
            const content = document.getElementById('role-tip-content');
            let tipHtml = '';

            if (state.currentRole === 'A') {
                tipHtml = `
                    &lt;div class=&quot;p-4 bg-orange-50 border-2 border-orange-200&quot;&gt;
                        &lt;p class=&quot;font-bold text-orange-800 mb-2&quot;&gt;角色 A：发布者&lt;/p&gt;
                        &lt;p class=&quot;text-[10px] text-orange-700 leading-relaxed&quot;&gt;你的任务是：编写并发送消息。选择一个主题，输入内容并发送，你的消息将传送到代理者那里。&lt;/p&gt;
                    &lt;/div&gt;
                `;
            } else if (state.currentRole === 'B') {
                tipHtml = `
                    &lt;div class=&quot;p-4 bg-green-50 border-2 border-green-200&quot;&gt;
                        &lt;p class=&quot;font-bold text-green-800 mb-2&quot;&gt;角色 B：代理者&lt;/p&gt;
                        &lt;p class=&quot;text-[10px] text-green-700 leading-relaxed&quot;&gt;你的任务是：审核并手动转发匹配消息。你需要查看 A 发送的消息，并根据 C 的订阅情况进行手动转发。&lt;/p&gt;
                    &lt;/div&gt;
                `;
            } else if (state.currentRole === 'C') {
                tipHtml = `
                    &lt;div class=&quot;p-4 bg-blue-50 border-2 border-blue-200&quot;&gt;
                        &lt;p class=&quot;font-bold text-blue-800 mb-2&quot;&gt;角色 C：订阅者&lt;/p&gt;
                        &lt;p class=&quot;text-[10px] text-blue-700 leading-relaxed&quot;&gt;你的任务是：订阅 &lt;strong&gt;2个&lt;/strong&gt; 你感兴趣的主题，然后等待并刷新以接收来自代理者的消息。&lt;/p&gt;
                    &lt;/div&gt;
                `;
            }

            content.innerHTML = tipHtml;
            modal.classList.add('active');
        }

        function closeRoleTip() {
            document.getElementById('role-tip-modal').classList.remove('active');
            enterGame();
        }

        // --- 初始化 ---
        function init() {
            const roleGrid = document.getElementById('role-grid');
            const roles = ['A', 'B', 'C'];
            for (let i = 1; i &lt;= 18; i++) {
                roles.forEach(role =&gt; {
                    const btn = document.createElement('button');
                    const emoji = role === 'A' ? '✍️' : (role === 'B' ? '🖥️' : '👂');
                    const groupColor = GROUP_COLORS[(i - 1) % GROUP_COLORS.length];
                    btn.className = `role-btn p-2 border-2 border-gray-200 bg-gray-50 text-center transition-all flex flex-col items-center justify-center`;
                    btn.style.borderBottomColor = groupColor;
                    btn.style.borderBottomWidth = '6px';
                    btn.innerHTML = `
                        &lt;div class=&quot;text-lg&quot;&gt;${emoji}&lt;/div&gt;
                        &lt;div class=&quot;font-bold text-[8px] mt-1&quot;&gt;${i}${role}&lt;/div&gt;
                    `;
                    btn.onclick = () =&gt; selectRole(i, role, btn);
                    roleGrid.appendChild(btn);
                });
            }

            // 生成 A 的主题列表
            const listA = document.getElementById('topic-list-a');
            TOPICS.forEach(t =&gt; {
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-3 border-2 border-gray-100 hover:bg-gray-50 transition-all mb-2 flex items-center space-x-2`;
                btn.innerHTML = `&lt;span style=&quot;color:${t.color}&quot;&gt;■&lt;/span&gt; &lt;span&gt;${t.name}&lt;/span&gt;`;
                btn.onclick = () =&gt; selectTopicA(t, btn);
                listA.appendChild(btn);
            });

            // 生成 C 的主题列表
            const listC = document.getElementById('topic-list-c');
            TOPICS.forEach(t =&gt; {
                const label = document.createElement('label');
                label.className = `flex items-center p-3 border-2 border-gray-100 hover:bg-gray-50 cursor-pointer mb-2`;
                label.innerHTML = `
                    &lt;input type=&quot;checkbox&quot; class=&quot;mr-3 w-5 h-5 accent-orange-600&quot; onchange=&quot;toggleSubscription('${t.id}')&quot;&gt;
                    &lt;span class=&quot;text-[10px]&quot;&gt;${t.name}&lt;/span&gt;
                `;
                listC.appendChild(label);
            });

            // 启动模拟实时轮询（实际应用中应使用WebSocket，此处用LocalStorage模拟）
            setInterval(syncData, 500);
        }

        // --- 核心逻辑 ---

        async function postData(data) {
            try {
                const formData = new FormData();
                for (const key in data) {
                    if (typeof data[key] === 'object') {
                        formData.append(key, JSON.stringify(data[key]));
                    } else {
                        formData.append(key, data[key]);
                    }
                }
                const response = await fetch('https://quickform.cn/api/re4wejp7tk', {
                    method: 'POST',
                    body: formData
                });
                console.log('数据已提交, 状态:', response.status, data);
            } catch (error) {
                console.error('Data sync error:', error);
            }
        }

        async function fetchData() {
            try {
                const response = await fetch('https://quickform.cn/api/re4wejp7tk');
                const result = await response.json();
                if (result &amp;&amp; result.data) {
                    // 假设接口返回的是提交记录列表
                    const allRecords = result.data;
                    
                    // 1. 提取所有消息
                    const allMsgs = allRecords
                        .filter(r =&gt; r.type === 'message')
                        .map(r =&gt; r.data);
                    
                    // 2. 提取所有订阅
                    const allSubs = {};
                    allRecords
                        .filter(r =&gt; r.type === 'subscription')
                        .forEach(r =&gt; {
                            allSubs[`${r.group}_C`] = r.topics;
                        });
                    
                    // 3. 提取所有转发记录
                    const allProcessed = {};
                    allRecords
                        .filter(r =&gt; r.type === 'forward_manual')
                        .forEach(r =&gt; {
                            if (!allProcessed[r.group]) allProcessed[r.group] = [];
                            allProcessed[r.group].push(r.messageId);
                        });

                    return { allMsgs, allSubs, allProcessed };
                }
            } catch (error) {
                console.error('Fetch data error:', error);
            }
            return null;
        }

        async function syncData() {
            // 优先从远程接口获取数据
            const remoteData = await fetchData();
            
            let allMsgs, allSubs;
            
            if (remoteData) {
                allMsgs = remoteData.allMsgs;
                allSubs = remoteData.allSubs;
                // 将远程的转发记录同步到本地，以便角色 B 和 C 逻辑使用
                for (let group in remoteData.allProcessed) {
                    localStorage.setItem(`mqtt_processed_${group}`, JSON.stringify(remoteData.allProcessed[group]));
                }
            } else {
                // 降级使用本地存储
                allMsgs = JSON.parse(localStorage.getItem('mqtt_msgs') || '[]');
                allSubs = JSON.parse(localStorage.getItem('mqtt_subs') || '{}');
            }

            if (state.currentRole === 'A') renderHistoryA(allMsgs);
            if (state.currentRole === 'B') renderRoleB(allMsgs, allSubs);
            if (state.currentRole === 'C') renderRoleC(allMsgs);
            if (!document.getElementById('teacher-screen').classList.contains('hidden')) renderTeacher(allMsgs, allSubs);
        }

        function selectRole(group, role, btn) {
            state.currentGroup = group;
            state.currentRole = role;
            document.querySelectorAll('.role-btn').forEach(b =&gt; {
                b.classList.remove('border-black', 'bg-orange-50', 'role-active');
            });
            btn.classList.add('border-black', 'bg-orange-50', 'role-active');
            
            // 自动触发进入游戏流程
            confirmGroup();
        }

        function enterGame() {
            if (!state.currentGroup || !state.currentRole) {
                alert('请先选择你的角色！');
                return;
            }
            
            // 隐藏所有初始界面
            const loginScreen = document.getElementById('login-screen');
            if (loginScreen) loginScreen.style.display = 'none';
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('status-bar').classList.remove('hidden');
            
            const identityText = document.getElementById('identity-text');
            identityText.innerHTML = `&lt;span class=&quot;group-tag mr-2&quot; style=&quot;background:${GROUP_COLORS[state.currentGroup-1]}&quot;&gt;组 ${state.currentGroup}&lt;/span&gt; 角色 ${state.currentRole}`;

            // 隐藏所有角色界面
            document.getElementById('role-a-screen').classList.add('hidden');
            document.getElementById('role-b-screen').classList.add('hidden');
            document.getElementById('role-c-screen').classList.add('hidden');

            if (state.currentRole === 'A') document.getElementById('role-a-screen').classList.remove('hidden');
            if (state.currentRole === 'B') document.getElementById('role-b-screen').classList.remove('hidden');
            if (state.currentRole === 'C') document.getElementById('role-c-screen').classList.remove('hidden');
            
            syncData();
        }

        function selectTopicA(topic, btn) {
            state.selectedTopicA = topic.id;
            document.querySelectorAll('#topic-list-a button').forEach(b =&gt; b.classList.remove('border-black', 'bg-orange-50'));
            btn.classList.add('border-black', 'bg-orange-50');
            document.getElementById('selected-topic-display').textContent = `当前主题：${topic.name}`;
        }

        function sendMessage() {
            alert('sendMessage 被调用了!');
            const content = document.getElementById('msg-input').value.trim();
            if (!state.selectedTopicA) return alert('请先选择一个主题！');
            if (!content) return alert('请输入消息内容！');

            const msg = {
                id: Date.now(),
                group: state.currentGroup,
                topicId: state.selectedTopicA,
                content: content,
                time: new Date().toLocaleTimeString()
            };

            // 存入 LocalStorage 模拟服务器
            const allMsgs = JSON.parse(localStorage.getItem('mqtt_msgs') || '[]');
            allMsgs.push(msg);
            localStorage.setItem('mqtt_msgs', JSON.stringify(allMsgs));

            // 发送到外部 API
            console.log('准备发送消息:', msg);
            postData({ type: 'message', data: msg });

            document.getElementById('msg-input').value = '';
            renderHistoryA();
        }

        function toggleSubscription(topicId) {
            if (state.isSubscribed) return; // 如果已订阅成功，禁止修改
            if (state.subscriptionsC.has(topicId)) {
                state.subscriptionsC.delete(topicId);
            } else {
                state.subscriptionsC.add(topicId);
            }
        }

        function confirmSubscription() {
            if (state.isSubscribed) return;
            
            if (state.subscriptionsC.size === 0) {
                alert('请至少选择一个主题进行订阅！');
                return;
            }

            // 同步订阅状态到本地存储
            const subs = JSON.parse(localStorage.getItem('mqtt_subs') || '{}');
            const currentSubs = Array.from(state.subscriptionsC);
            subs[`${state.currentGroup}_C`] = currentSubs;
            localStorage.setItem('mqtt_subs', JSON.stringify(subs));
            
            // 发送到外部 API
            postData({ 
                type: 'subscription', 
                group: state.currentGroup, 
                topics: currentSubs 
            });

            state.isSubscribed = true;

            // 视觉反馈并禁用
            const btn = document.querySelector('#role-c-screen .pixel-btn.bg-blue-600');
            if (!btn) return;
            btn.textContent = '✓ 订阅成功';
            btn.classList.replace('bg-blue-600', 'bg-gray-400');
            btn.classList.add('cursor-not-allowed');
            btn.onclick = null;
            
            // 禁用所有 checkbox
            document.querySelectorAll('#topic-list-c input').forEach(input =&gt; {
                input.disabled = true;
            });
        }

        // --- 渲染函数 ---

        function renderHistoryA(allMsgs = []) {
            const container = document.getElementById('history-a');
            const myMsgs = allMsgs.filter(m =&gt; m.group === state.currentGroup).reverse();
            container.innerHTML = myMsgs.map(m =&gt; `
                &lt;div class=&quot;p-3 bg-gray-50 border-2 border-gray-200 text-[10px]&quot;&gt;
                    &lt;div class=&quot;flex justify-between mb-2&quot;&gt;
                        &lt;span class=&quot;font-bold text-orange-600&quot;&gt;${TOPICS.find(t =&gt; t.id === m.topicId).name}&lt;/span&gt;
                        &lt;span class=&quot;text-gray-400 text-[8px]&quot;&gt;${m.time}&lt;/span&gt;
                    &lt;/div&gt;
                    &lt;p class=&quot;text-gray-700&quot;&gt;${m.content}&lt;/p&gt;
                &lt;/div&gt;
            `).join('');
        }

        function renderRoleC(allMsgs = []) {
            const container = document.getElementById('msg-list-c');
            const empty = document.getElementById('empty-c');
            
            // 获取 B 已处理（转发）的消息 ID 列表
            const processedMsgs = JSON.parse(localStorage.getItem(`mqtt_processed_${state.currentGroup}`) || '[]');

            const myMsgs = allMsgs.filter(m =&gt; 
                m.group === state.currentGroup &amp;&amp; 
                state.subscriptionsC.has(m.topicId) &amp;&amp;
                processedMsgs.includes(m.id) // 关键修改：只有 B 转发过的消息 C 才能看到
            ).reverse();

            if (myMsgs.length &gt; 0) {
                empty.classList.add('hidden');
                container.innerHTML = myMsgs.map(m =&gt; `
                    &lt;div class=&quot;msg-bubble p-4 border-2 border-black&quot;&gt;
                        &lt;div class=&quot;flex items-center space-x-2 mb-2&quot;&gt;
                            &lt;span class=&quot;px-2 py-1 bg-blue-600 text-white text-[8px] font-bold&quot;&gt;${TOPICS.find(t =&gt; t.id === m.topicId).name}&lt;/span&gt;
                            &lt;span class=&quot;text-gray-400 text-[8px]&quot;&gt;${m.time}&lt;/span&gt;
                        &lt;/div&gt;
                        &lt;p class=&quot;text-blue-900 font-medium text-[10px]&quot;&gt;${m.content}&lt;/p&gt;
                    &lt;/div&gt;
                `).join('');
            } else {
                empty.classList.remove('hidden');
                container.innerHTML = '';
            }
        }

        function renderRoleB(allMsgs, allSubs) {
            const groupMsgs = allMsgs.filter(m =&gt; m.group === state.currentGroup);
            const groupSubs = allSubs[`${state.currentGroup}_C`] || [];
            const processedMsgs = JSON.parse(localStorage.getItem(`mqtt_processed_${state.currentGroup}`) || '[]');

            // A 发送的
            document.getElementById('b-incoming').innerHTML = groupMsgs.map(m =&gt; {
                const isForwarded = processedMsgs.includes(m.id);
                const isSubscribed = groupSubs.includes(m.topicId);
                
                return `
                &lt;div class=&quot;p-2 bg-gray-50 border-2 border-gray-100 text-[8px] mb-2&quot;&gt;
                    &lt;div class=&quot;flex justify-between items-start mb-1&quot;&gt;
                        &lt;span class=&quot;text-orange-600 font-bold&quot;&gt;[${TOPICS.find(t =&gt; t.id === m.topicId).name}]&lt;/span&gt;
                        ${!isForwarded ? 
                            `&lt;button onclick=&quot;manualForward(${m.id}, '${m.topicId}')&quot; class=&quot;px-2 py-1 bg-orange-500 text-white border border-black text-[6px] hover:bg-orange-600&quot;&gt;转发&lt;/button&gt;` : 
                            `&lt;span class=&quot;text-green-600 font-bold&quot;&gt;已转发&lt;/span&gt;`
                        }
                    &lt;/div&gt;
                    &lt;p class=&quot;text-gray-700&quot;&gt;${m.content}&lt;/p&gt;
                    ${!isSubscribed &amp;&amp; !isForwarded ? `&lt;div class=&quot;text-[6px] text-red-400 mt-1&quot;&gt;注: C未订阅此主题&lt;/div&gt;` : ''}
                &lt;/div&gt;
            `}).reverse().join('');

            // C 订阅的
            document.getElementById('b-subscriptions').innerHTML = groupSubs.map(s =&gt; `
                &lt;span class=&quot;px-2 py-1 bg-blue-100 text-blue-700 border border-blue-300 text-[8px] font-bold&quot;&gt;${TOPICS.find(t =&gt; t.id === s).name}&lt;/span&gt;
            `).join('') || '&lt;span class=&quot;text-gray-300 text-[8px]&quot;&gt;暂无订阅&lt;/span&gt;';

            // 转发给 C 的
            const forwarded = groupMsgs.filter(m =&gt; processedMsgs.includes(m.id));
            document.getElementById('b-outgoing').innerHTML = forwarded.map(m =&gt; `
                &lt;div class=&quot;p-2 bg-green-50 border-2 border-green-100 text-[8px]&quot;&gt;
                    &lt;span class=&quot;text-green-600 font-bold&quot;&gt;✓ 已转发:&lt;/span&gt; ${m.content}
                &lt;/div&gt;
            `).reverse().join('');

            document.getElementById('b-count').textContent = forwarded.length;
        }

        function manualForward(msgId, topicId) {
            const allSubs = JSON.parse(localStorage.getItem('mqtt_subs') || '{}');
            const groupSubs = allSubs[`${state.currentGroup}_C`] || [];
            
            if (!groupSubs.includes(topicId)) {
                alert('C 同学尚未订阅此主题，无法转发！请提醒 C 同学订阅相关主题。');
                return;
            }

            const processedMsgs = JSON.parse(localStorage.getItem(`mqtt_processed_${state.currentGroup}`) || '[]');
            if (!processedMsgs.includes(msgId)) {
                processedMsgs.push(msgId);
                localStorage.setItem(`mqtt_processed_${state.currentGroup}`, JSON.stringify(processedMsgs));
                
                postData({ 
                    type: 'forward_manual', 
                    group: state.currentGroup, 
                    messageId: msgId,
                    topic: topicId
                });
                
                syncData();
            }
        }

            document.getElementById('teacher-login-modal').classList.add('active');
        }

        function hideTeacherLogin() {
            document.getElementById('teacher-login-modal').classList.remove('active');

        function renderTeacher(allMsgs, allSubs) {

            for (let i = 1; i &lt;= 18; i++) {
                const groupMsgs = allMsgs.filter(m =&gt; m.group === i);

        function hideGroupDetail() {
            const modal = document.getElementById('group-detail-modal');

        function resetAllData() {
            if (confirm('确定要重置全班所有数据吗？这将清空所有消息和订阅。')) {
                localStorage.removeItem('mqtt_msgs');
                localStorage.removeItem('mqtt_subs');
                syncData();

        function resetGame() {
            location.reload();
        }

        init();

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
