    &lt;!-- 登录弹窗 --&gt;
    &lt;div id=&quot;login-modal&quot; class=&quot;fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-50&quot;&gt;

            &lt;div class=&quot;text-center mb-6&quot;&gt;
                &lt;div class=&quot;text-5xl mb-2&quot;&gt;🌡️&lt;/div&gt;

                &lt;input type=&quot;text&quot; id=&quot;user-name&quot; class=&quot;w-full px-5 py-3 rounded-xl border-2 border-slate-100 focus:border-red-400 outline-none transition-all&quot; placeholder=&quot;输入你的姓名&quot;&gt;
                &lt;button onclick=&quot;login()&quot; class=&quot;w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-red-200 transition-all&quot;&gt;进入实验室&lt;/button&gt;

    &lt;!-- 学生端：角色选择与发送 --&gt;

        &lt;div class=&quot;flex justify-between items-center mb-8&quot;&gt;
            &lt;h1 class=&quot;text-2xl font-black text-slate-800 uppercase tracking-tight&quot;&gt;数据传输效果测试 &lt;span class=&quot;text-red-500&quot;&gt;v1.0&lt;/span&gt;&lt;/h1&gt;
            &lt;div class=&quot;bg-white px-4 py-2 rounded-full shadow-sm text-sm font-bold text-slate-600&quot;&gt;
                用户: &lt;span id=&quot;current-user-name&quot; class=&quot;text-red-500&quot;&gt;&lt;/span&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;grid grid-cols-1 lg:grid-cols-12 gap-8&quot;&gt;
            &lt;div class=&quot;lg:col-span-4 space-y-4&quot;&gt;
                &lt;div class=&quot;glass-card p-6 rounded-3xl shadow-sm&quot;&gt;
                    &lt;h3 class=&quot;font-bold text-slate-700 mb-4 flex items-center gap-2&quot;&gt;
                        &lt;span class=&quot;w-2 h-6 bg-red-500 rounded-full&quot;&gt;&lt;/span&gt;
                        1. 选择你的设备角色
                    &lt;/h3&gt;
                    &lt;div class=&quot;grid grid-cols-2 gap-3&quot; id=&quot;role-grid&quot;&gt;&lt;/div&gt;
                    &lt;p class=&quot;text-xs text-slate-400 mt-4 italic&quot;&gt;💡 提示：请先点击上方卡片选择一个气象传感器作为你的身份。&lt;/p&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;div class=&quot;lg:col-span-8 space-y-4&quot;&gt;
                &lt;div class=&quot;glass-card p-6 rounded-3xl shadow-sm relative overflow-hidden&quot;&gt;
                    &lt;h3 class=&quot;font-bold text-slate-700 mb-4 flex items-center gap-2&quot;&gt;
                        &lt;span class=&quot;w-2 h-6 bg-red-500 rounded-full&quot;&gt;&lt;/span&gt;
                        2. 选择目标并发送指令
                    &lt;/h3&gt;
                    &lt;div class=&quot;bg-slate-50 rounded-2xl p-4 mb-4 border-2 border-dashed border-slate-200&quot;&gt;
                        &lt;p class=&quot;text-xs text-slate-400 mb-3 uppercase font-bold&quot;&gt;在线设备列表 (点击选择目标)&lt;/p&gt;
                        &lt;div class=&quot;flex flex-wrap gap-3&quot; id=&quot;target-list&quot;&gt;&lt;/div&gt;
                    &lt;/div&gt;
                    &lt;div class=&quot;flex gap-3&quot;&gt;
                        &lt;input type=&quot;text&quot; id=&quot;cmd-input&quot; class=&quot;flex-1 px-5 py-4 rounded-2xl border-2 border-slate-100 focus:border-red-400 outline-none&quot; placeholder=&quot;输入指令...&quot;&gt;
                        &lt;button onclick=&quot;sendMessage()&quot; id=&quot;send-btn&quot; class=&quot;bg-slate-800 hover:bg-black text-white px-8 py-4 rounded-2xl font-bold transition-all flex items-center gap-2&quot;&gt;
                            &lt;span&gt;发送&lt;/span&gt;
                        &lt;/button&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
                &lt;div class=&quot;glass-card p-6 rounded-3xl shadow-sm h-48 overflow-y-auto&quot; id=&quot;log-box&quot;&gt;
                    &lt;div class=&quot;text-slate-400 text-sm italic&quot;&gt;等待指令发出...&lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;script&gt;
        const ROLES = [
            { id: 'temp', name: '温度传感器', icon: '🌡️' },
            { id: 'humi', name: '湿度传感器', icon: '💧' },
            { id: 'wind_speed', name: '风速传感器', icon: '🍃' },
            { id: 'wind_dir', name: '风向传感器', icon: '🧭' },
            { id: 'rain', name: '雨量传感器', icon: '🌧️' },
            { id: 'pressure', name: '气压传感器', icon: '⏲️' },
            { id: 'light', name: '光照传感器', icon: '☀️' },
            { id: 'uv', name: '紫外线传感器', icon: '🕶️' },
            { id: 'pm25', name: 'PM2.5传感器', icon: '🌫️' },
            { id: 'co2', name: 'CO2传感器', icon: '🧪' },
            { id: 'soil_humi', name: '土壤水分传感器', icon: '🌱' },
            { id: 'soil_temp', name: '土壤温度传感器', icon: '🌡️' },
            { id: 'noise', name: '噪声传感器', icon: '📢' },
            { id: 'visibility', name: '能见度传感器', icon: '👁️' }
        ];

        const TARGETS = [
            { id: 'phone_zhang', name: '张老师的手机', icon: '📱' },
            { id: 'pad_li', name: '李老师的平板', icon: '平板' },
            { id: 'watch_san', name: '张三的智能手环', icon: '⌚' },
            { id: 'big_screen', name: '学校大屏幕', icon: '🖥️' },
            { id: 'whiteboard', name: '8年级1班希沃白板', icon: '🏫' },
            { id: 'pc_lab', name: '微机室主控机', icon: '💻' },
            { id: 'speaker_hall', name: '礼堂智能音箱', icon: '🔊' },
            { id: 'kiosk', name: '校园信息查询机', icon: 'ℹ️' }
        ];

        let state = { user: '', role: null, target: null };

        function login() {
            const name = document.getElementById('user-name').value.trim();
            if (!name) return alert('请输入姓名');
            state.user = name;
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('student-app').classList.remove('hidden');
            document.getElementById('current-user-name').innerText = name;
            initStudentView();
        }

        function initStudentView() {
            const grid = document.getElementById('role-grid');
            ROLES.forEach(r =&gt; {
                const div = document.createElement('div');
                div.className = 'node-item glass-card p-4 rounded-2xl text-center border-2 border-transparent';
                div.innerHTML = `&lt;div class=&quot;text-3xl mb-1&quot;&gt;${r.icon}&lt;/div&gt;&lt;div class=&quot;text-xs font-bold text-slate-600&quot;&gt;${r.name}&lt;/div&gt;`;
                div.onclick = () =&gt; {
                    document.querySelectorAll('#role-grid .node-item').forEach(i =&gt; i.classList.remove('node-selected'));
                    div.classList.add('node-selected');
                    state.role = r;
                    addLog(`你已选择角色：${r.name}`, 'system');
                };
                grid.appendChild(div);
            });

            const tList = document.getElementById('target-list');
            TARGETS.forEach(r =&gt; {
                const div = document.createElement('div');
                div.className = 'node-item bg-white px-4 py-2 rounded-xl shadow-sm border-2 border-transparent text-sm font-bold';
                div.innerText = `${r.icon} ${r.name}`;
                div.onclick = () =&gt; {
                    document.querySelectorAll('#target-list .node-item').forEach(i =&gt; i.classList.remove('node-selected'));
                    div.classList.add('node-selected');
                    state.target = r;
                };
                tList.appendChild(div);
            });
        }

        function addLog(msg, type) {
            const box = document.getElementById('log-box');
            const div = document.createElement('div');
            div.className = `text-sm mb-1 ${type === 'system' ? 'text-amber-600 italic' : 'text-slate-700'}`;
            div.innerHTML = `&lt;span class=&quot;opacity-50&quot;&gt;[${new Date().toLocaleTimeString()}]&lt;/span&gt; ${msg}`;
            box.prepend(div);
        }

        function sendMessage() {
            if (!state.role) return alert('请先选择你的角色！');
            if (!state.target) return alert('请选择发送目标！');
            const cmd = document.getElementById('cmd-input').value || 'Ping';

            addLog(`🚀 发送指令给 [${state.target.name}]: ${cmd}`, 'info');
            
            const payload = {
                user: state.user,
                from: state.role.name,
                to: state.target.name,
                command: cmd,
                timestamp: new Date().toISOString()
            };

            fetch('https://quickform.cn/api/re4wejp7tk', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(err =&gt; console.error('Sync failed:', err));

            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            setTimeout(() =&gt; {
                btn.disabled = false;
                addLog(`✅ [${state.target.name}] 已接收并响应`, 'info');
            }, 1000);
        }
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
