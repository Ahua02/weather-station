    &lt;meta charset=&quot;UTF-8&quot;&gt;
    &lt;meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;&gt;
    &lt;title&gt;SIoT 校园气象站 - 教师端实时监控&lt;/title&gt;
    &lt;style&gt;
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        /* 头部区域 */
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding: 25px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 {
            font-size: 2em;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #aaa; font-size: 0.95em; }
        .header .live-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 统计卡片网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .stat-card .icon { font-size: 2.5em; margin-bottom: 10px; }
        .stat-card .number {
            font-size: 2.2em;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card .label { color: #aaa; margin-top: 5px; font-size: 0.9em; }

        /* 进度条可视化 */
        .progress-section {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .progress-section h3 {
            margin-bottom: 15px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .progress-item {
            margin-bottom: 15px;
        }
        .progress-item .label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        .progress-bar {
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.5s ease;
        }
        .progress-fill.level1 { background: linear-gradient(90deg, #4facfe, #00f2fe); }
        .progress-fill.level2 { background: linear-gradient(90deg, #fa709a, #fee140); }
        .progress-fill.level3 { background: linear-gradient(90deg, #a8edea, #fed6e3); }

        /* 控制栏 */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        
        .refresh-timer {
            color: #00ff88;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .refresh-timer .countdown {
            background: rgba(0,255,136,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        /* 搜索栏 */
        .search-bar {
            flex: 1;
            min-width: 200px;
        }
        .search-bar input {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1em;
        }
        .search-bar input::placeholder { color: #888; }

        /* 实时动态列表 */
        .feed-section {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .feed-header {
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .feed-header h3 { color: #00d4ff; display: flex; align-items: center; gap: 10px; }
        .feed-badge {
            background: #ff6b6b;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8em;
        }

        /* 学生卡片 */
        .student-card {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: 15px;
            align-items: center;
            transition: background 0.3s;
        }
        .student-card:hover { background: rgba(255,255,255,0.05); }
        .student-card:last-child { border-bottom: none; }
        
        .student-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
        }
        .student-info .name {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        .student-info .time {
            font-size: 0.8em;
            color: #888;
        }
        .student-progress {
            display: flex;
            gap: 8px;
        }
        .level-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .level-badge.completed {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #1a1a2e;
        }
        .level-badge.in-progress {
            background: rgba(255,193,7,0.3);
            color: #ffc107;
            border: 1px solid #ffc107;
        }
        .level-badge.pending {
            background: rgba(255,255,255,0.1);
            color: #888;
        }
        
        .student-detail {
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.85em;
            color: #aaa;
            max-width: 300px;
            text-align: right;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .empty-state .icon { font-size: 4em; margin-bottom: 20px; opacity: 0.5; }

        /* 详情弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal-content h2 {
            margin-bottom: 20px;
            color: #00d4ff;
        }
        .modal-close {
            position: absolute;
            top: 15px; right: 20px;
            background: none;
            border: none;
            color: #888;
            font-size: 2em;
            cursor: pointer;
        }
        .modal-close:hover { color: #fff; }
        .detail-row {
            display: flex;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .detail-label {
            width: 120px;
            color: #888;
            flex-shrink: 0;
        }
        .detail-value { flex: 1; color: #fff; }
        .detail-json {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.9em;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }

        /* Toast通知 */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: bold;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: #00ff88; color: #1a1a2e; }
        .toast.error { background: #ff4757; color: white; }

        /* 响应式 */
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .student-card { 
                grid-template-columns: auto 1fr; 
                gap: 10px;
            }
            .student-progress { grid-column: 1 / -1; }
            .student-detail { 
                grid-column: 1 / -1; 
                text-align: left;
                max-width: none;
            }
            .controls { flex-direction: column; }
            .search-bar { width: 100%; }
        }
    &lt;/style&gt;

    &lt;script&gt;
        // API配置
        const API_URL = 'https://quickform.cn/api/j7j1kzehoe';
        
        // 数据状态
        let allStudents = [];
        let filteredStudents = [];
        let countdown = 10;

        // 初始化
        document.addEventListener('DOMContentLoaded', () =&gt; {
            refreshData();
            startAutoRefresh();
            updateClock();
        });

        // 启动自动刷新
        function startAutoRefresh() {
            setInterval(() =&gt; {
                countdown--;
                if (countdown &lt;= 0) {
                    refreshData();
                    countdown = 10;
                }
                document.getElementById('countdown').textContent = countdown;
            }, 1000);
        }

        // 更新时间
        function updateClock() {
            setInterval(() =&gt; {
                const now = new Date();
                document.getElementById('updateTime').textContent = 
                    now.toLocaleTimeString('zh-CN');
            }, 1000);
        }

        // 获取数据
        async function refreshData() {
            try {
                const response = await fetch(`${API_URL}/all`);
                const json = await response.json();
                const submissions = json.submissions || json.data || [];
                
                // 按学生分组
                const studentMap = new Map();
                submissions.forEach(sub =&gt; {
                    const id = sub.studentId || sub.student_id || '匿名';
                    if (!studentMap.has(id)) {
                        studentMap.set(id, {
                            id: id,
                            submissions: [],
                            maxLevel: 0,
                            lastTime: null,
                            rawData: sub
                        });
                    }
                    const student = studentMap.get(id);
                    student.submissions.push(sub);
                    
                    // 检测关卡
                    let level = parseInt(sub.level) || 0;
                    if (sub.status === 'Completed') {
                        if (level &gt; student.maxLevel) student.maxLevel = level;
                    } else if (sub.status === 'Started') {
                        // 如果是Started，说明正在这一关，maxLevel至少是level-1
                        if (level - 1 &gt; student.maxLevel) student.maxLevel = level - 1;
                    }
                    
                    const time = new Date(sub.timestamp || sub.created_at);
                    if (!student.lastTime || time &gt; student.lastTime) {
                        student.lastTime = time;
                        student.rawData = sub; // 保留最新的原始数据
                    }
                });

                allStudents = Array.from(studentMap.values())
                    .sort((a, b) =&gt; b.maxLevel - a.maxLevel || (b.lastTime - a.lastTime));
                
                filteredStudents = [...allStudents];
                updateStats();
                renderStudents();
                showToast('✅ 数据更新成功 (' + submissions.length + '条)', 'success');
            } catch (error) {
                console.error('获取数据失败:', error);
                showToast('❌ 获取数据失败', 'error');
                renderEmpty();
            }
        }

        // 更新统计
        function updateStats() {
            const uniqueCount = allStudents.length;
            let level1 = 0, level2 = 0, level3 = 0;
            let totalSubs = allStudents.reduce((sum, s) =&gt; sum + s.submissions.length, 0);

            allStudents.forEach(s =&gt; {
                if (s.maxLevel &gt;= 1) level1++;
                if (s.maxLevel &gt;= 2) level2++;
                if (s.maxLevel &gt;= 3) level3++;
            });

            document.getElementById('totalCount').textContent = totalSubs;
            document.getElementById('uniqueCount').textContent = uniqueCount;
            document.getElementById('level1Count').textContent = level1;
            document.getElementById('level2Count').textContent = level2;
            document.getElementById('level3Count').textContent = level3;

            // 更新进度条
            const pct = uniqueCount &gt; 0;
            const l1p = pct ? Math.round(level1 / uniqueCount * 100) : 0;
            const l2p = pct ? Math.round(level2 / uniqueCount * 100) : 0;
            const l3p = pct ? Math.round(level3 / uniqueCount * 100) : 0;

            document.getElementById('level1Bar').style.width = l1p + '%';
            document.getElementById('level2Bar').style.width = l2p + '%';
            document.getElementById('level3Bar').style.width = l3p + '%';
            document.getElementById('level1Progress').textContent = l1p + '%';
            document.getElementById('level2Progress').textContent = l2p + '%';
            document.getElementById('level3Progress').textContent = l3p + '%';
        }

        // 渲染学生列表
        function renderStudents() {
            const container = document.getElementById('studentsList');
            document.getElementById('filterCount').textContent = filteredStudents.length;

            if (filteredStudents.length === 0) {
                container.innerHTML = `
                    &lt;div class=&quot;empty-state&quot;&gt;
                        &lt;div class=&quot;icon&quot;&gt;📭&lt;/div&gt;
                        &lt;p&gt;暂无数据&lt;/p&gt;
                    &lt;/div&gt;`;
                return;
            }

            let html = '';
            filteredStudents.forEach((student, index) =&gt; {
                const avatar = student.id.charAt(0).toUpperCase();
                const timeStr = student.lastTime ? formatTime(student.lastTime) : '--';
                
                html += `
                    &lt;div class=&quot;student-card&quot; onclick=&quot;showDetail(${index})&quot;&gt;
                        &lt;div class=&quot;student-avatar&quot;&gt;${avatar}&lt;/div&gt;
                        &lt;div class=&quot;student-info&quot;&gt;
                            &lt;div class=&quot;name&quot;&gt;${escapeHtml(student.id)}&lt;/div&gt;
                            &lt;div class=&quot;time&quot;&gt;🕐 ${timeStr}&lt;/div&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;student-progress&quot;&gt;
                            ${renderLevelBadge(1, student.maxLevel)}
                            ${renderLevelBadge(2, student.maxLevel)}
                            ${renderLevelBadge(3, student.maxLevel)}
                        &lt;/div&gt;
                        &lt;div class=&quot;student-detail&quot;&gt;
                            📤 ${student.submissions.length}次状态更新
                        &lt;/div&gt;
                    &lt;/div&gt;`;
            });

            container.innerHTML = html;
        }

        // 渲染关卡徽章
        function renderLevelBadge(level, maxLevel) {
            if (maxLevel &gt;= level) {
                const labels = ['', '第1关', '第2关', '第3关'];
                return `&lt;span class=&quot;level-badge completed&quot;&gt;✓ ${labels[level]}&lt;/span&gt;`;
            } else if (maxLevel === level - 1) {
                return `&lt;span class=&quot;level-badge in-progress&quot;&gt;进行中&lt;/span&gt;`;
            }
            return `&lt;span class=&quot;level-badge pending&quot;&gt;未开始&lt;/span&gt;`;
        }

        // 显示详情
        function showDetail(index) {
            const student = filteredStudents[index];
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('detailContent');

            let html = `
                &lt;div class=&quot;detail-row&quot;&gt;
                    &lt;div class=&quot;detail-label&quot;&gt;学生ID&lt;/div&gt;
                    &lt;div class=&quot;detail-value&quot;&gt;${escapeHtml(student.id)}&lt;/div&gt;
                &lt;/div&gt;
                &lt;div class=&quot;detail-row&quot;&gt;
                    &lt;div class=&quot;detail-label&quot;&gt;最高关卡&lt;/div&gt;
                    &lt;div class=&quot;detail-value&quot;&gt;第${student.maxLevel}关&lt;/div&gt;
                &lt;/div&gt;
                &lt;div class=&quot;detail-row&quot;&gt;
                    &lt;div class=&quot;detail-label&quot;&gt;更新次数&lt;/div&gt;
                    &lt;div class=&quot;detail-value&quot;&gt;${student.submissions.length}次&lt;/div&gt;
                &lt;/div&gt;
                &lt;div class=&quot;detail-row&quot;&gt;
                    &lt;div class=&quot;detail-label&quot;&gt;最后更新&lt;/div&gt;
                    &lt;div class=&quot;detail-value&quot;&gt;${student.lastTime ? formatFullTime(student.lastTime) : '--'}&lt;/div&gt;
                &lt;/div&gt;
                &lt;div class=&quot;detail-row&quot; style=&quot;border:none&quot;&gt;
                    &lt;div class=&quot;detail-label&quot;&gt;最新原始数据&lt;/div&gt;
                    &lt;div class=&quot;detail-value&quot;&gt;&lt;/div&gt;
                &lt;/div&gt;
                &lt;div class=&quot;detail-json&quot;&gt;${JSON.stringify(student.rawData, null, 2)}&lt;/div&gt;`;

            content.innerHTML = html;
            modal.classList.add('show');
        }

        function closeDetail() {
            document.getElementById('detailModal').classList.remove('show');
        }

        // 过滤学生
        function filterStudents() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            filteredStudents = allStudents.filter(s =&gt; 
                s.id.toLowerCase().includes(query)
            );
            renderStudents();
        }

        // 渲染空状态
        function renderEmpty() {
            document.getElementById('studentsList').innerHTML = `
                &lt;div class=&quot;empty-state&quot;&gt;
                    &lt;div class=&quot;icon&quot;&gt;❌&lt;/div&gt;
                    &lt;p&gt;数据加载失败，请检查网络&lt;/p&gt;
                &lt;/div&gt;`;
        }

        // 工具函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            if (diff &lt; 60000) return '刚刚';
            if (diff &lt; 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff &lt; 86400000) return Math.floor(diff / 3600000) + '小时前';
            return date.toLocaleDateString('zh-CN');
        }

        function formatFullTime(date) {
            return date.toLocaleString('zh-CN');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() =&gt; toast.classList.remove('show'), 3000);
        }
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
